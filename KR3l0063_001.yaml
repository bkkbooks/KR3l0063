body:
  text: 玉照新志卷一宋王明清撰神廟聖意鋭於圖治熙寧之政既一切變更法度開邊之議遂興洮河成功梅仙拓地然後經理西南小羌韓存寶以弗績誅繼而永樂大衄徐禧之徒死之由是恥於佳兵上亦鬱陶成疾元祐初政廟堂諸公共議捐其所取紹聖崇寧紹述之説舉竄逐棄地之柄臣取青唐進築隍鄯銀夏至童貫蔡攸乃啓燕雲之役馴至靖康之禍悉本二子紹述思之令人痛心疾首焉元祐黨人天下後世莫不推尊之紹聖所定止七十三人至蔡元長當國凡所背己者皆著其間殆至三百九人皆石刻姓名頒行天下其中愚智溷淆不可分别至於前日詆訾元祐之政者亦獲厠名矣唯有識講論之熟者始能辨之然而禍根實基於元祐嫉惡太甚焉吕汲公梁况之劉器之定王介甫親黨吕汲甫章子厚而下三十人蔡持正親黨安厚卿曾子宣而下十人榜之朝堂范淳父上疏以為殱厥渠魁脅從罔治范忠宣太息語同列曰吾輩將不免矣後來時事既變章子厚建元祐黨果如忠宣之言大抵皆出於士大夫報復而卒使國家受其咎悲夫元祐初修神宗實録秉筆者極天下之文人如黃秦朝張是也故詞采粲然髙出前代紹聖初鄧聖求蔡元長上章指以為謗史乞行重修蓋舊文多取司馬文正公涑水紀聞如韓富歐陽諸公傳及敘劉永年家世載徐占德母事王文公之詆永年常山吕正獻之評曾南豐安簡借書多不還陳秀公母賤之類取引甚多至新史於是裕陵實録皆以朱筆抹之且究問前日史臣悉行遷斥盡取王荆公日録無遺以刪修焉號朱墨本陳瑩中上書曾文肅謂尊私史而壓宗廟者也其所從來亦有本焉覽之者熟究而考之當知此言不誣紹興庚申金人以河南故地歸我詔以孟富文庾為東京留守富文辟畢少董良史以自隨未幾金敗盟少董身陷金地者纍年常於相國寺鬻故書處得熙豐日厯殘帙數葉無復論敘少董南歸出以相示於是輯其可以傳信者凡八條今録於編亦有已見裕陵日録中者並存之云中書劄子度支員外郎充龍圖待制秦鳯路經略安撫使吕大防奏伏見本州路鳯翔府寄居著作佐郎前崇文院校書郎張載學術精深性資方毅昨因得告尋醫未蒙朝廷召命義難自闕事充晉州州學教授陸長愈狀欲乞今後春秋釋奠並以兖鄒二公配享如允所請乞即下禮部定奪次序立式伏乞備聞奏州司所據陸長愈狀聞敕旨尋下太常寺定奪申部今據本寺狀看詳至聖文宣王以先師顔子配享及以次從祀皆其門弟子也孟子知道固當尊禮然與孔子異代難與顔子並行配享之禮所請難議施行申部看詳太常寺所定未得允當古者配享及從祀但取著德立功其道有以相成者不必皆用同時之人如蠟之祭也主先嗇而祭司嗇先農之配即以后稷神勾芒為少昊氏之子祝融為高辛氏火正今春秋之祭則勾芒配伏羲祝融太庭迎氣之日又為從祀異代之人得為配祀明矣唐貞觀二十一年詔伏生與髙堂生杜預范寧之徒二十一賢與顔子俱配享孔子廟堂至今猶為從祀孟子亦於孔聖之門當在顔子之列至荀況揚雄韓愈皆發明先聖之道有益學者久未配享誠為闕典伏請自今春秋釋奠以鄒國公孟子配享文宣王設位於兖國公之次所有荀況揚雄韓愈並以世次先後祀於左丘明等二十一賢之間所貴上稱聖朝褒崇儒賢備條祀典之意謹録奏聞伏候敕旨帖檢會左丘明至范寧二十一人並封伯爵如允所請即乞荀況揚雄韓愈並加伯爵自國子監及天下至聖文宣王廟皆塑鄒國公像其冠服同兖國公仍畫荀況等像於從祀之列荀況在左丘明之下冠服皆從封爵奉聖旨依又云敕下江東轉運司斷太中大夫充龍圖閣待制江寧府陳繹為前知廣州日將造到公使庫檀木觀音將松木觀音換檀木觀音入已並將公使錢糴糧餵飼自己白鷴等並役使土丁槍手修築廨宇內地基及並將官乳香於神寺獨自焚燒並申奏辨明所犯虛詐及取勘時逐次虛妄對罪並男承務郎新差汝州洛南稻田務陳彥輔從使廣州軍人織造木綿生活等罪並取勘虛妄並將仕郎試國子監四門助教郭應之於廣州公使庫受供給與陳繹管勾宅庫買賣物虧價陳繹合追見在太中大夫舊職大夫龍圖閣待制或以職當徒一年勒停緣前項輕罪內犯盜贓一匹仍令準制例追毁出身以來誥敕文字除名勒停杖陳彥輔各從杖一百私罪上定斷罰銅十斤放郭應之該赦奉敕並依斷內陳繹特見除名勒停落龍圖閣待制仍追一官差知建昌軍替鄭琰成資過滿闕陳彥輔特衝替又云王安石劄子奏幸遇聖運超拔等夷知奬眷憐逮兼父子戴天負地感涕難勝顧迫衰殘糜捐何補不勝螻蟻微願臣今所居江寧府上元縣園屋為僧寺一所永逺祝延聖壽如蒙矜許特賜名額廣昭希曠榮遇一時仰慿威神誓報無已取進止奉聖旨依所乞以報本禪寺為名額其中載練亨甫事以知經術馳名熙寧間為王荆公之髙弟而所坐乃爾殊不可曉又恐在謫籍一時官吏迎合觀望如秦少遊未可知耳章聖朝种明逸抗疏辭歸終南舊隱上命設燕禁中令廷臣賦詩以寵其行獨翰林學士杜鎬辭以素不習詩誦北山移文一遍明逸不懌云野人焉知大丈夫之出處哉熙寧中王荆公進用時有王一介中甫者以詩詆之云草廬三顧動幽蟄蕙帳一空生曉寒荆公不以為忤但賦絶句云莫向空山覔舊題野人休誦北山移丈夫出處非無意猿鶴從來自不知蓋取於此中甫三衢人也昭陵時中制科仕裕陵為從官子沇之彥允漢之彥周渙之彥昭溈之彥楚皆近世名卿今家居京口熙寧中有太廟齋郎薑適者淄川人樞密遵之孫嘗從開府覔舉還鄉途中有平輿數乘每相先後初亦不暇問之既抵里中乃徑趨其家適出詢之有婦人焉顔色絶代方二十餘語適曰吾來為汝家婦適云吾納室久矣豈容他人婦云使足下自有妻我願妾御無悔反覆酬酢久之適知其怪然勢不容拒遂以廊廡間空屋數楹處之徐觀其變婦者亦有使令自置煙爨烹庖飲食無異常人略無毫髮之擾亦不與之講男女之好也既無從詰其來歷但合門畏懼而已積是逾年人情相與亦頗稔熟忽有道人直造舍婦一見掩袂大笑道人者語適云子儻不遇我禍有不可言者此劍仙也始與其夫亦甚和鳴終乃反目婦易形外避其夫訪於天下今將迹至君家來殺此婦並及君焉吾先知之萬里來救君命今夕必有異子但閉門勿開安以待之可保無虞是夜三鼓後忽窗中劃然有聲見二劍自空飛入適如其言瞑目安坐少焉二劍盤旋於適頸之前後天將曉矣忽聞喝聲甚厲云可啓觀即蚤來之道人也下視之有人首一血流滿地道人曰可賀矣腰間瓢中取藥一捻地血化為白水人首與道人俱不見次日婦人亦辭謝而去適自此神氣秀爽不復利名縈心屛妻子常往來鄠杜之間以藥餌符水療人疾數見效時人敬之其後孫處恭安禮所言如此安禮君子人也所言必不妄明清近觀熙豐起居注云元豐四年慈聖光獻皇后上仙裕陵追慕至忘寢食適詣闕上言能使返魂上亦信之使試其術且載其施行云太廟齋郎薑適進狀稱係虞部郎中正觀之子光祿寺丞緯之姪為學道休官有法能致致一作救太皇太后復生詔差御藥院李舜舉傳宣中書密院兩府南廳醫詢本人稱限六十日內當如其所陳於京師城內金明池內修壇作醮差御藥監及宣賜靜衣一套至期無驗復詰之云太皇方與仁宗憑玉闌干賞千樹梅花無意復思人間上以狂妄除名送秀州編管後不知所終元祐三年東坡先生自翰苑出牧錢塘道毗陵之洛社時孫仲益之父教村童於野市茅􅉉之下仲益方七八嵗立於岸側東坡望見奇之呼來前與語果不凡詢其所學方為七字對矣與之題云衡茅稚子璠璵器仲益隨聲應之云翰苑仙人錦繡腸大加賞歎贈之以縑酒囑其父善視之後來果為斯文之主盟趙諗者其先本出西南夷獠賊其族黨來降賜以國姓至諗不量其力乃與其黨李造賈時成等宣言欲誅君側之姦其語頗肆狂悖然初無弄兵之謀建中靖國時事既變諗亦幡然息心來京師注官時曾文肅當國一見奇其才而薦之擢國子博士諗謁告省其父母於蜀中其徒勾羣以前事告變獄既遂以反逆伏誅父母妻子悉皆流竄改其鄉里渝州為恭州文肅亦坐責告詞略云逮求可用之才輒薦逆謀之首是也究其始正由狷忿妄作遂至殺身覆宗百世之下永負冦盜之名學者亦當以輕剽為戒焉明清每閲唐史甘露事未嘗不流涕也嗟夫士大夫處昏庸之世不幸罹此後來無人别白可恨近觀續皇王寶運録云僖宗光啓四年正月詔云太和九年故宰臣王涯以下十七家並見陷逆名本承密旨遂令忠憤終被寃誣六十餘年幽枉無訴宜沾沛澤用慰泉扄並與洗雪各復官爵兼訪其子孫與官使銜寃之魂亦信眉於九原矣惜乎劉昫宋景文歐陽文忠不見此詔載之於新舊唐史殊為闕文如褒贈常濬孟昭圖二人之文亦其時以見之洪景盧容齋三筆不復重録明清家昔有盧載范陽家志一書敘其祖多遜行事之詳為陸務觀假去因循不曾往索尚能倣佛記其二三則云多遜素與李孟雍穆厚善多遜竄逐後萬里相望聲迹渺絶時法禁嚴邸報不至海外一日忽赦書至後有參知政事李多遜云此必孟雍若登政府吾必北轅戒舍人俶裝已而果移容州團練副使未渡巨浸忽見江南李主衣冠如平生問云相公何以至此多遜云屈後主云汝屈何如我屈由是感疾而殂又多遜門下士有种英蘇冠者平生最器重之得罪之後賓客雲散獨英冠二人徒步送抵天涯而還英後易名放即明逸冠易名易簡魁天下為參知政事本朝有兩張先皆字子野一則樞密副使遜之孫與歐陽文忠同在洛陽幕府其後文忠為作墓志銘稱其志守端方臨事敢決者一與東坡先生遊東坡推為前輩詩中所謂詩人老去鶯鶯在公子歸來燕燕忙能為樂府號張三影者有兩蘇世美一東坡作哀詞者一蘇丞相子名京二人皆知名士也王子高遇芙蓉仙人事舉世皆知之子髙初名迥後以傳其詞遍國中於是改名蘧易字子開與蘇黃遊甚稔見於尺牘東坡先生又作芙蓉詩云決别之時芙蓉授神丹一粒告曰無戚戚後當偕老於澄江之上初所未喻子開時方十八九已而結婚向氏十年而鰥居年四十再娶江隂巨室之女方二十矣合卺之後視其妻則清盼冶容修短合度與前所遇無纖毫之異詢以前語則惘然莫曉而澄江江隂之里名也子開由是遂為澄江人焉服其丹年八十餘康強無疾明清壬午嵗從外舅帥淮西子開之孫明之譓在幕府相與遊從每以見語如此此事與雲溪友議玉簫事絶相類子開趙州人忠穆駿之孫虞部員外郎正路之子晚守濡須祠堂焉賀方回為子開挽詞我昔官房子嘗聞忠穆賢又云和璧終歸趙干將不葬吳今乃印在秦少遊集中明之子即為和寧也少遊沒於元符末子開大觀中猶在其誤明矣圓鏡枉斷哀絃曾記酒闌歌罷難忘月底花前舊攜手處層樓朱户觸目依然從來慣向繡幃羅帳鎮效比翼文鴛誰念我而今清夜常是孤眠入户不如飛絮傍懷爭及爐煙這回休也一生心事為爾縈牽此得廉宣仲布所記云元符中饒州舉子張生南宫不利歸妓欲與之俱而張不可約半嵗必再至若渝盟一日則任其從人張偶以親之命後約幾月始至京師首訪舊遊其鄰僦舍者迎謂曰君非饒州張君乎六娘每恨失約日托我訪來期於學舍其母痛折之而念益切前三日母以歸洛陽富人張氏遂偕去矣臨發涕泣多與我金錢令俟君來引觀故居畢乃僦後人生入觀則小樓奧室歡館宛然几榻猶設不動知其初去如所言也生大戚愴不能自持迹其所向百計不能知矣作雨中花詞盛傳於都下云或云即知常之子豫功燾也明清述揮麈録列本朝諸帝以潛藩為軍府今又敬以徽宗詔旨考之云至和中五年十二月己亥宣德郎王恬等言本貫遂州按九域志都督府遂州為遂寧郡武信軍節度使元豐八年陛下初封遂寧郡王紹聖元年復以遂寧郡王出閣與蘇潤二州時同而事均緣本州遂寧縣元符二年縣下慧明院秋冬間忽觀佛像五次出現父老咸曰遂寧佛出越三年奉陛下即位此其祥兆乞改府額詔升為遂寧府又詔主上嘗為蜀國公升蜀州為崇慶府政和七年十二月壬午詔以宿州零璧為靈璧縣以真州為儀真郡通州為靜海郡秀州為嘉興郡從九域圖志所奏請也實録與三州圖經及儀真通州嘉興三志皆所不載明清嘗陳於禮部乞行下逐州照會施行是嵗十二月甲申司勳員外郎張大亨奏切見朝廷講讀之官在天子所者謂之侍讀侍講而諸王府亦有侍讀侍講官比擬稱呼相紊名之不正孰大於是太宗皇帝初為韓冀諸王侍讀置侍講後有欲為皇族子孫置之議者以唐文宗改諸王侍講為奉諸王侍讀請以教授為名從之且皇族學官尚不可與王府同稱而王府官豈可同天子講讀之號詔諸王府侍講改為直講侍讀改為贊讀大亨字嘉父一時知名士也宣和元年十一月乙未知溫州蘇起奏臣昨謹將耕藉詔書刻石被以雲鶴安奉廳事仍行下四縣依此施行自此風雨調順禾稼盛茂既以收穫枯荄又復生穗每畝得榖一石至七八斗乞令諸路州縣效此施行裕陵覽奏不樂云起諂佞一至於此何以警在位其華飾手詔豈不是相侮可送吏部蹙破眉峰碧纖手還重執鎮日相看未足時便忍使鴛鴦隻薄暮投村驛風雨愁通夕窗外芭蕉窗裏人分明葉上心頭滴裕陵親書其後云此詞甚佳不知何人作奏來蓋以詔曹組者今宸翰尚藏其家宣和末禁中訛言祟出深邃之所有水殿一遊幸之所不到一日忽報池面蓮花盛開非常年比裕陵攜嬪御閹官凡數十人往觀之既至彼則有婦人俯首憑欄者若熟寢狀上云必是先在此祗候太早不得眠所以然喻左右勿恐懼見其鬒髮如雲素頸燦玉呼之凝然不顧上訝之自以所執玉麈揮觸之愕然而起回首乃一男子鬚髯如棘面長尺餘四目若電極為可畏從駕之人悉皆辟易驚仆上亦為之失措逡巡不見上急命回輦未幾京城失守狩於朔方明清揮麈餘話記周美成瑞鶴仙事近於故篋中得先人所敘特為詳備今具載之美成以待制提舉南京鴻慶宫自杭徙居睦州夢中作長短句瑞鶴仙一闋既覺猶能全記了不詳其所謂也未幾青溪賊方臘起逮其鴟張方還杭州舊居而道路兵戈已滿僅得脫死始入錢塘門但見杭人倉皇奔避如蜂屯蟻沸視落日半在鼓角樓􅉉間即詞中所謂斜陽映山落斂餘霞猶戀孤欄角者應矣當是時天下承平日久吳越享長間之樂而狂冦嘯聚徑自睦將直搗蘇杭聲言遂踞二浙浙人傳聞內外響應求死不暇美成舊居既不可往是日無處得食飢甚忽於稠人中有呼待制何往者視之鄉人之侍兒素所識者也且曰日昃必未食能捨車過酒家乎美成從之驚遽間連引數杯散去腹􅑎頓解乃詞中所謂凌波步弱過短亭何用素約有流鶯勸我重解繡鞍緩引春酌之句驗矣飲罷覺微醉便耳目惶惑不敢少留徑出城北江漲橋諸寺士女已盈滿不能駐足獨一小寺經閣偶無人遂宿其上即詞中所謂上馬誰扶醒眠朱閣者應矣既見兩浙處處奔避遂絶江居揚州未及息肩而傳聞方賊已盡據二浙將涉江之淮泗因自計方領南京鴻慶宫有齋廳可居乃挈家往焉則詞中所謂念西園已是花深無地東風又惡之語應矣至鴻慶未幾以疾卒别任流光過了歸來洞天自樂又應於身後矣美成平生好作樂府將死之際夢中得句而字字皆驗卒章又應於身後豈偶然哉美成之守潁上與僕相知其至南京又以此詞見寄尚不知此詞之言待其死乃盡驗如此明清揮麈録載雍孝聞事頗詳近見秋浦朱去奢云孝聞自海外量移池州以卒嘗有詩云官田種秫陶元亮私釡生塵范史雲至今郡人猶傳誦之孝聞沒後和州道士亡其姓名冒而為孝聞走江淮間其才亦不下孝聞有弔項羽廟文云無守陵之蕙帳有照夜之寒釭過東坡墓題詩云文星落處天地泣此老已亡吾道窮才力漫趨生仲逹功名猶忌死姚崇人間便覺無清氣海外何人識古風平日萬篇誰愛惜六丁收拾在瑤宫宣和初至京師遂得幸祐陵謂其人可及林靈素之半錫姓名朱廣漢至紹興中猶在寓會稽之天長觀明清尚及識之而洪景盧夷堅志中記其一事云鄭紳者京師人少日以賔贊事政府坐纍被逐貧窶之甚妻棄去適他人一女流落宦寺家不暇訪其生死日益以困偶往相監問命於日者日者驚曰後當官極品未論其他而今已為觀察且喜在今日君其識焉同行儕輩笑且排之甫出寺門有快行家者數輩宣召甚急始知其女已入禁中得幸九重矣即除閣門宣贊舍人未及嵗以女正長秋拜廉察不數年位登師垣爵封郡王極其富貴榮寵妻再適張公緼夤緣肺腑亦至正任承宣使韓髦斯士鄭氏壻也見語如此東坡先生知杭州馬中玉成為浙漕東坡被召赴闕中玉席間作詞曰來時吳會猶殘暑去日武林春已暮欲知遺愛感人深灑淚多於江上雨歡情未舉眉先聚别酒多斟君莫訴從今寧忍看西湖擡眼盡成腸斷處東坡和之所謂明朝歸路下塘西不見鶯啼花落處是也中玉忠肅亮之子仲甫猶子也玉照新志卷一
