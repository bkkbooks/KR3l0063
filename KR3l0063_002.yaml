body:
  text: 玉照新志卷二宋王明清撰陳瑩中諫垣集言之詳矣削籍於建中靖國崇寧初蔡元長召拜同知樞密院事卒於位恩數甚渥後二年其子郊擢福建轉運判官登對歸與客言穆若之容不合相法終當有播遷之厄客告其語遂坐誅弟邦送涪州編管處厚亦追貶單州團練副使具列詔旨至重和元年燕雲之伐興處厚之姪孫堯臣以布衣詣京師扣閽上書力陳不可且極言一時之失逾萬言末有御批云比縁大臣建議欲恢復燕雲故地王堯臣遠方書生能陳歴代興衰之迹達於朕聽臣僚咸謂毁薄時政首沮大事乞行竄殛朕以承平之久言路壅蔽敢諫之士不當寘之典刑優加爵賞僉論何私堯臣崇寧四年已曾許用處厚遺表恩澤奏𥙷因處厚責䧏遂寢不行今處厚未盡復舊官可特追復正奉大夫給還遺表恩澤特先𥙷堯臣承務郎此九月二十二日施行明清伏讀至是淚落䦨干始知永祐從諫如轉圜而淵衷初亦知北征爲非特當時大臣唯務迎合將順以邀功不能身任死事卒至禍亂可不痛哉今盡列堯臣之疏於左臣觀商髙宗甞命傅說曰朝夕納誨以輔台徳說復陳於王曰唯木從䋲則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命臣每讀至此未甞不掩卷太息以謂天下萬幾一人聽㫁雖甚憂勞不能盡善堂上逺於百里以九重之深而欲盡分四方萬里之遠百辟之忠邪賢佞生民之利害休戚顧不難哉是帝王之德盛於納諫諫行言聽則膏澤下於民天下同臻於晏然之域社稷之利也臣聞陛下臨御之初從諫如流甞下求言之詔曰言而不當朕不加罪於是謇諤之士冒昧自竭咸盡愚衷而憸人故杜塞言路竊弄威柄乃熒惑陛下加以詆誣之罪遂使陛下負拒諫之謗於天下矣比年以來言事之臣朝奏夕貶天下之人結舌杜口以言爲諱乃者宦寺專命交結權臣共倡北伐之議思所以蠧國而害民上自宰執下自臺諫曾無一人肯爲陛下言者咸以前事爲戒陛下復何賴焉臣愚謂燕雲之役興則邊隙遂開宦寺之權重則皇綱不振此臣所以日夜爲陛下寒心也臣螻蟻之身自頂至踵不足以膏陛下之斧鉞倘使上冒天威必罰無赦臣雖就死何悔何憚而不言哉願畢其說以獻焉臣聞憂在内者本也憂在外者末也夫天下無内憂而有外懼有天下國家者必固本以釋末未曾竭内以事外雖羈縻制御之不失徒使爲中國之藩籬耳曷嘗與之謀大事圖大功俾憂生乎内也昔王郁說契丹入塞以牽晉兵定人皆以爲後患可不鑒哉古者鄰敵憂在内不在外外憂之患吾能固本以釋末將賢而士勇隨即剪滅其患不及中原泰山之安有足恃者内憂之懼由吾竭内以事外邦本凋殘海内虚耗累卵之危指日可待外憂之不去聖人猶且恥之内憂而不爲之計臣愚不知天下之所以久安無憂甚可懼也陛下亦思之乎厥今天下之勢危如累卵奈何陛下不思所以固本之術委任奸臣竭生靈膏血以取必争之地使上累聖徳億兆同憂今敵人之乞和非畏吾也葢邊境之上未有可乘之釁使之來冦彼故茫然不以動其心陛下將啓燕雲之役異日唇亡齒寒邊境有可乘之隙敵情叵測安得不蓄其銳而俟吾隙以逞其所大欲耶將見四方交侵雖有智者不能善其後矣昔秦始皇纘累世之餘烈旣幷六國南取百越之地以爲桂林𧰼郡北築長城而守藩籬却匈奴萬里其意非以衛邊地而救民死乃貪利而欲廣大也故功未立而天下叛漢孝武資累世之積蓄財力有餘士馬强盛務恢封畧圖制匈奴患其兼徙西國結黨南㓂乃表河曲列四郡開玉門通西域以㫁匈奴右臂師旅之費不可數計至於用度不足算及舟車因之以㓙年冦盜並起始棄輪臺之地下哀痛之詔豈非仁聖之所悔哉宋文帝元嘉中比西漢文景分命諸將經略河南致拓跋𤓰步之師因而國亂陳宣帝纘業之後拓土開疆志大不已遂有吕梁之敗江右日蹙力殫財竭旋爲隋氏所滅隋煬帝負其富強之資逞無厭之欲頻出朔方三駕遼左旌旗萬里賦歛百出四海騷然土崩魚爛喪身滅國唐太宗定海内時稱英主然而東有遼海之軍西有崑丘之役師旅數勞百姓疲斃雖未至於禍亂然不免有中才庸主之譏明皇開元之際宇内謐如邊將邀寵競圖戰伐西陲青海之戍東北天門之師磧西怛邏之戰雲南渡瀘之役没於異域數十萬人安冦乘之天下離潰是皆窮兵貪地好功勤遠忽守成持盈之道不顧勞民之弊昔者周宣中興玁狁爲害追之太原及境而止葢不欲弊中國怒遠方也故享國日久詩人咏其美孝文專務以徳化民凡有不便輒弛以利民匈奴結和親後乃背約入盜令邊備守不發兵深入恐勞百姓是以國富刑清漢祚日永天下歸仁孝元亦納賈捐之議棄珠崖之陋後世以爲美談東漢建武中人康俗阜臧宫馬武請伐匈奴報曰舎近謀遠者勞而無功舍遠謀近者逸而有終務廣地者荒務廣徳者強有其有者安貪其有者殘自是諸將莫敢復言兵事可謂深達治源者乎歴觀前世雖征討殊𩔖時有異同勢有可否謀有得失事有成敗然毒蠧四表瘡痍兆姓未甞不由好大喜功竭内事外者也人謂國雖大好戰必亡故聖人務徳不務廣土王者不治逺人春秋亦内諸夏而外吳楚非謂中國之力不能制之以其言語不通贄幣不同嗜好迥殊習俗詭異居於絶域之外山河之表崎嶇山谷險阻之地是以外而不内疎而不戚政教不及其人正朔不加其國誠不欲竭内以事外也故樊噲甞願得十萬衆横行匈奴中季布謂其可斬馮奉世矯詔斬莎車王宣帝議加爵賞蕭望之謂矯詔違命雖有功不可爲法恐後奉使者爲國家生事陳湯誅郅支匡衡劾其矯制而顓命郝靈荃斬黙啜姚崇慮彼邀功者生心三朝終不加賞抑有由矣是知古者天子守在四夷來則懲而御之去則備而守之其慕義而貢獻則接之以禮羈縻不絶使曲在彼此聖人制御夷狄之常道也在昔東胡避李牧北虜憚郅都南蠻服孔明西戎畏郝玭此四人者皆明智而忠信寛厚而愛人君臣同體固守邊疆故能威鎮四夷北人不敢南下而牧馬志士不敢彎弓而報怨或有僥倖一時爲國生事興造邊隙邦憲具在夫何患云我宋太祖皇帝撥亂反正躬擐甲胄總熊羆之衆當時將相大臣皆所與取天下者然卒不能下幽燕兩州之殘冦豈勇力智慧之不足哉葢兩州之地犬戎所必争者不忍使吾赤子重困鋒鏑乃置而不問章聖皇帝澶淵之役以匈奴舉國來冦不得已而與戰旣戰而勝乃聽其求和遂與之盟逡巡引兵而退者葢亦欲固邦本而不忍困民力也明矣伏願陛下思祖宗積累之難鑒歴代君臣之失永塞邊隙務守景徳舊好選忠謀智勇之人如郅都者使守邊塞而嚴軍髙壘毋戰閉關據扼荷㦸而守之上以安宗廟下以撫生靈豈不韙哉臣前所謂燕雲之役興則邊隙遂開者此也臣觀自古國家之敗未嘗不由宦者專政當時時君世主心非不知其然而因循信任不能㫁而逺之故終至委靡頹弊傾覆神器不可支吾而後已大抵此曹手執帝爵口銜天憲則臣下之死生禍福在焉出入卧内靡間朝夕巧於將迎則君心爲之必移况隆以髙爵分以厚禄加之信任以資其威福之權哉我宋開基太祖皇帝鑒前代之弊務行剗革内品供奉不過二十人徒使供門户洒埽之役寳元以後員數倍增廩禄從優咸平中秦翰雷有終因討王均之亂旣而有功授以恩州刺史自後劉寳信等初無纖毫之功咸起僥倖之心乃攀援二人遂皆遥領團防刺史議者否之繼以明道制命出於帷幄威福假於宦寺斜封墨勅之授匪人委用漸大茲風一扇先朝之典制盡廢當時臺諫以死争之期必行而後已今乃不然宦寺之數不知其幾但見腰金袍紫充滿朝廷處富貴之極忘守分之嚴專總威權决議中禁蔽九重之聰明擅四海之生殺懐諂佞之心巧媚曲求者則舉而登用勵匪躬之操直情忤意者則立見排斥以至中外服從上下屛氣府第羅列天都親族布滿丹陛南金和寳氷紈霧縠之積侔於天子嬙媛侍兒歌童舞女之玩僣擬後宫狗馬飾雕文土木被錦繡更相援引同惡相濟一日再賜一月累封爵命極矣田園廣矣金繒溢矣奴婢官矣搢紳士大夫盡出其門矣非復向時掖庭永巷之職閨牖房闥之任矣皇綱何由而振耶是以賢才怨讟志士窮棲莫此爲甚昔人謂宦者專則國命危良有以也臣布衣賤士無官守言責不敢纖悉條具上瀆聖聽請以誤國之大者言之童貫起自腐賤本無智謀陛下付以兵柄俾掌典機密自出師陜右已彌嵗祀專以欺君罔上爲心虛立城寨妄報邊捷以爲己功汲引羣小易置將吏以植私黨交通饋遺鬻賣官爵超獵除授紊亂典常有自調選不由舉薦而改京秩者有自行伍不用資格而得防團者有放逐田里不應甄敘而擢登清禁者有託儒爲名了不知書而任以蘭省者或陵徳鮮禮不通世務徒以家累億金望塵羅拜公行賄賂而致身青雲者比比皆是或養驕恃勢不知古今徒以門髙閥貴搖尾乞憐僥倖請託而立登要津者紛紛接踵一時鮮儷寡亷鮮恥之人争相慕悅侵漁百姓奉其所欲惟恐居後兵法戰士冒矢石被傷生有金帛之賜死有褒賜之榮自兵權歸貫紛更殆盡戰塲之卒秋毫無所得死者又誣以逃亡之罪賞罰不明兵氣委靡凱還未久秩品已崇庖人廏卒掃門執鞭之士冒功奏賞有馴致節鉞者名器一何輕哉山西勁卒貫盡選爲輕兵實以自衛屯攻戰伐之際他兵躬行陣之勞振旅班師之後親兵冒無功之賞貫意安在此天下所共憤而陛下恬不顧也貫爲將帥每得内幣金帛以濟軍需悉充私藏乃立軍期之法取償於州縣依勢作威倚法肆貪暴賦横斂民不堪命將士爲之解體貫且爲之洋洋自得兇焰傲然臺諫之中間有剛毅不囘之士愛君憂國一言議已則中以危法遂使天下不敢言而歸怨陛下矣今者中外之人或謂貫深結蔡京同納燕人李良嗣以爲謀主幷倡北伐之議經營之久國用匱乏乃始方田以增常稅均糴以充軍儲茶鹽之法朝行暮改民不奠居加之以饑饉迫之以重斂其勢必無以自全陛下茍能速革其弊則赤子膏血不爲此曹涸也今天下之民被茲毒蠧久矣其貧至矣養生送死不足之憾亦深矣昔人謂刻核太至者必有不肖之心應之焉臣愚深恐無常心之民以刻核太至不能自安或萌不肖之心其患有至於不可禦者又況天視自我民視天聽自我民聽民之怨氣天心關焉非朝廷之福也劉蕡謂自古宦官領軍政未有不敗國喪師者其言載之青史雖愚夫愚婦莫之或非陛下倘優游不㫁異時禍稔蕭牆奸生帷幄追悔何及伏願陛下廓天日之明塞隂邪之路制侵凌迫脅之心復門户掃除宦寺之役使安其分可也臣亦謂宦者亂人之國其源深於女禍陛下若暱之此臣愚所不識也恭惟陛下以社稷爲心以生靈爲念思患禍於未萌之幾戒其所當戒更其所當更㫁自宸衷決而行之無䘏邪論之紛紛天下幸甚臣前所謂宦寺之權重則皇綱不振者此也臣一介草茅世食陛下之禄沐浴陛下之膏澤久矣當此之時各𨼆情意以言爲諱臣獨輒比狂直上觸天意非不知言出而禍從計行而身戮葢痛紀綱之壊哀生靈之困變亂將起社稷將危忠憤所激有不能自已不識陛下能赦之否臣聞唐貞觀時有上封事者或不切事文狀呈之欲加黜責鄭公諌曰古者立謗木欲聞已過封事其謗木之遺乎陛下思聞得失咨其所陳言而是乎爲朝廷之益非乎無損於政帝悅皆勞遣之臣惓惓之私非敢望陛下咨其所陳求採其實而行之使納諫之君不獨專美於前代臣子之至願也惟陛下裁之嗚呼犯顔逆鱗者人臣之盡忠廣覽兼聴者聖王之盛徳臣之所以自處者可謂忠矣陛下所以處臣者宜何如哉願少緩天威庶開忠讜之路永保無窮之基倘或不容身首異處取笑士𩔖亦臣所不恤也靖康初堯臣爲宣義郎成都府華陽丞欽宗親批云王堯臣昨所上書議論慷慨愛君憂國出於誠心可特轉奉議郎除見缺臺諫官聘書甫下而堯臣死矣裕陵初復西邊境土夷人初不知姓氏詢之邊人云皇帝何姓云姓趙皇后何姓云姓向大朝直臣爲誰云包樞宻拯是也於是推其族𩔖各從其姓至今有仕於中朝者然多右列明清揮麈前録載中書令舍人紅鞓自葉少藴始出於姚令威叢話近觀孫仲益所作霍端友仁仲行狀云以大觀元年十一月除通直郎試中書舍人賜三品服故事三品服角帶佩金魚爲飾一日徽宗顧見公謂左右曰給舍等耳而服色相絶如此詔令太中大夫以上犀帶垂魚自公始也與姚所記少異湯舉者處州縉雲人與先人太學同舍生有才名於宣政間登第之後累任州縣積官至承議郎居鄉邑以疾不起舉適上課當遷員郎而綸軸未頒有王令洙者南都人文安堯臣之後爲縉雲令告其家云未湏發喪少俟命下舉妻懼不敢令洙力勉之且爲亟遣价疾馳入都趣取告身越旬日始到然後舉哀令洙爲保任申郡遺澤遂沾其子即進之思退也後中詞科賜出身盡歴華要登元台震耀一時亦異事也故書之明清投轄録所敘劉快活事後來思索所未盡者今列於編外曾祖空青文肅之第三子也快活每以三運使呼之後果終漕輓舅氏宏父談天者多言他日必爲卿相劉笑曰官職俱是正郎去不得矣文肅當國先祖爲起曹郎中一日忽見過曰我今見曾三女兒他日當爲公之子婦時先妣方五六嵗又謂先人曰曾三女汝之夫人也歸見文肅呼先祖字云王樂道之子三運使之壻此兒他日名滿天下然位壽俱嗇奈何已而文肅罷相遷宅衡陽北歸後先祖守九江遣先人訪文肅於京口一見奇之遂以先妣歸焉後所言一一皆合不差毫釐其他𩔖此尚多不能悉記異哉馮燕傳見之麗情集唐賈耽守太原時事也元祐中曾文肅帥幷門感嘆其義風自製水調歌頭以亞大曲然世失其傳近閱故書得其本恐久而湮没盡録於後排遍第一魏豪有馮燕年少客幽幷擊毬鬬雞爲戲遊俠久知名因避仇來東郡元戎留屬中軍直氣凌貔虎須臾叱咤風雲凛凛坐中偶乘佳興輕裘錦帶東風躍馬徃來訪尋幽勝遊冶出東城堤上鶯花撩亂香車寳馬縱横草軟平沙穏髙樓兩岸春風語笑隔簾聲排遍第二袖籠鞭敲鐙無語獨閒行縁楊下人初静烟淡夕陽明窈窕佳人獨立瑤階擲果潘郎瞥見紅顔橫波盼不勝嬌軟倚銀屛曳紅裳頻推朱户半開還掩似欲倩吚啞聲裏細說深情因遣林間青鳥爲言彼此心期的的深相許竊香解佩綢繆相顧不勝情排遍第三說良人滑將張嬰從來嗜酒還家鎮長酩酊狂酲屋上鳴鳩空鬬梁間客燕相欺誰與花爲主蘭房從此朝雲夕雨兩牽縈似遊絲飄泊隨風無定奈何嵗華荏苒歡計苦難慿唯見新恩繾綣連理並翼香閨日日爲郎誰松蘿托蔓一比一毫輕排遍第四一夕還醉開户起相迎爲郎引裾相庇低首畧潛形情深無𨼆欲郎乘間起佳兵授青萍茫然撫歎不忍欺心爾能負心於我於我必無情熟視花鈿不足剛腸終不能平假手迎天意一揮霜刃腮間粉頸㫁瑤瓊排遍第五鳯凰釵寳玉彫零慘然悵嬌魂怨飲泣吞聲還被凌波呼喚相將金谷同遊想見逢迎處揶揄羞面粧臉𩔖濙濙醉眠人醒來晨起血凝螓首但驚喧白鄰里駭我卒難明致幽囚推究覆盆無計哀鳴丹筆終誣服圜門驅擁銜寃垂首欲臨刑排遍第六帶花遍向紅塵裏有喧呼攘臂轉聲辟衆莫遣人寃濫殺張室忍偷生僚吏驚呼呵叱狂辭不變如初投身屬吏慷慨吐丹誠彷彿縲紲自疑夢中聞者皆驚歎爲不平割愛無心泣對虞姬手戮傾城寵翻然起死不教仇怨負寃聲排遍第七攧花十八義城元靖賢相國嘉慕英雄士錫金繒聞斯事頻歎賞封章歸印請贖馮燕罪日邊紫泥封詔闔境赦深刑萬古三河風義在青簡上衆知名河東注任流水滔滔水涸名難泯至樂府歌詠流入管絃聲玉照新志卷二
