body:
  text: 玉照新志卷五宋王明清撰明清嘗於畢少董處覩种明逸手書所作詩一首殆五十年猶能全記今録於此樓臺縹眇路歧傍共說祈真白玉堂株𣗳風髙低絳節靈臺香冷醮虛皇名傳六合何昭晰事隔三清限渺茫欲識當年漢家意竹宫梧殿更凄涼世傳太公家教其言極淺陋鄙俚然見之唐李習之文集至以文中子為一律觀其中猶引周漢以來事當是唐村落間老校書為之文中子想亦是唐所録其言未免疏略經本朝阮逸為之潤色所以辭達於理如市井間所印百家姓明清嘗詳考之似是兩浙錢氏有國時小民所著何則其首云趙錢孫李蓋錢氏奉正朔趙氏乃本朝國姓所以錢次之孫乃忠懿之正妃又其次則江南李氏次句云周吳鄭王皆武肅而下后妃無可疑者明清家舊有常子允元祐中在館閣同舍諸公手狀如黃秦朝張諸名人皆在焉後為龔頥正易去比觀洪景盧容齊三筆乃云見於王順伯所以為髙子允者常名立汝隂人與家中有鄉曲之舊夷父秩之子熙寧初父子俱以處士起家子允為崇文館校書即元祐中再入館後坐黨籍謫永州監稅以卒石刻碑中可考此卷乃子允與大父者而景盧指為高君不知髙子允又何人耶杜子美作飲中八仙歌敘酒中之樂甚至由是觀之子美亦好飲者不然又焉得醉中詆嚴武幾至殺身耶宣和中外祖曾空青公守山陽有堂胥之子韓璡者以御筆來為轉運司勾當公事年未冠而率略之甚一日語外祖云先丈嘗為何處差遣外祖云曾在中書復詢云何年耶答云建中靖國之初自右府而過璡大笑云豈有察院而過中書省乎蓋謂其儕類而然外祖即應之云先公自知樞密院拜右僕射璡默然闔席為閧堂絶倒雷轟薦福碑事見楚僧惠洪冷齊夜話去嵗婁彥發機自饒州通判歸詢之云薦福寺雖號番陽巨剎元無此碑乃惠洪僞為是說然東坡已有詩曰有客打碑來薦福之句按惠洪初名德洪政和元年張天覺罷相坐關節竄海外又數年回僧始易名惠洪字覺範考此書距坡下世已逾一紀洪與坡蓋未嘗先接恐是已有妄及之者則非洪之鑿空矣洪本筠州髙安人嘗為縣小吏黃山谷喜其聰慧教令讀書為浮屠氏其後海內推為名僧韓駒作寂音尊者塔銘即其人也韓子蒼駒本蜀人父為峽州夷陵令老矣有一妾子蒼不能奉之父怒逐出內侍賈祥先坐罪竄是郡駒父事祥甚謹祥不能忘子蒼父逐之後走京師祥已收召大用事子蒼往投之祥不知其得罪於其父也獻其所業偶裕陵忽問遷謫中有何人材祥即出子蒼詩文以進首篇太乙真人之句上覽奇之即批出賜進士及第除祕書省正字不數年遂掌外制紹聖中有王毅者文貞之孫以滑稽得名除知澤州不稱其意往别時宰章子厚曰澤州油衣甚佳良久又曰出餳極妙毅曰啓相公待到後當終日坐地披著油衣食餳也子厚啓齒毅契之子倫也石才叔蒼舒雍人也與山谷遊從尤妙筆札家蓄圖書甚富文潞公帥長安從其借所藏禇遂良聖教序墨蹟一觀潞公愛玩不已因令子弟臨一本休日宴僚屬出二本令坐客别之客盛稱公者為真反以才叔所收為僞才叔不出一語以辨笑啓潞公云今日方知蒼舒孤寒潞公大哂坐客赧然中興初政治宋齊愈退翁獄斷案得之陸務觀云是年大駕自維揚倉猝南狩文書悉皆散失未必存於有司因録於左然紹興中趙鼎張浚為左右相嘗共啓髙宗云靖康之末金人議立僞主意在張邦昌而退翁適在衆中發於憤躁掌上密書以示所厚云金人設意如是坐有姦人隨聲唱之故及於禍思陵惻然憐之詔追復元官録其子孫元牘云建炎元年七月二十八日尚書省札子臣僚上言新除諫議大夫宋齊愈昨三月初間同王時雍等在皇城司聚議乞立邦昌拜大金賜詔畢書立狀時雖時雍等恐懼不敢填寫張邦昌姓名而齊愈執筆奮然大書張邦昌三字乃自封其狀以示四坐無不驚駭齊愈自言自從二月在告不出欺誕若此聞左右時雍等實齊愈也今使居諫議大夫之任一時陛下未知其人邪佞而朝廷未有人論更乞聖裁七月八日同奉聖㫖宋齊愈罷諫議大夫令御史臺王賓置司根勘具案聞奏今據王賓勘到宋齊愈招金人邀請淵聖皇帝出城未回知孫傳乘傳軍前遣吳幵等將文字稱廢淵聖共舉堪為人主一人及知孫傳等乞不廢淵聖皇帝須管於異名中選舉姓名通申齊愈知孫傳等在皇城司集議遂到本司見衆官及桌子上文字不論資次管舉一人齊愈問王時雍舉誰時雍曰金人令吳幵來密諭㫖意在張邦昌今已寫下只空姓名又看得元來文字請舉軍前南官以此參驗王時雍言語即是要舉張邦昌齊愈恐違時别生不測為吳幵王時雍曾說吳幵密諭張邦昌亦欲蚤了圖出齊愈輒自舉筆於紙上書寫張邦昌姓名三字欲要於舉狀內填寫却將王時雍稱是又節次遍呈在座元集議官齊愈令人吏依紙上所寫張邦昌三字係時雍等别寫申狀係時雍等姓名分付吳幵莫儔將去其舉狀內别無齊愈姓名初蒙勘問時懼罪𨼆下不招再蒙取㑹到中書舍人李㑹狀二月下旬間忽有左司員外郎宋齊愈自外至見商議未定即於本司㕔前取紙筆就桌子上取紙一片書寫張邦昌三字即不是文字上書遍呈在座相顧失色皆莫敢應别無言語其所寫姓名文字係宋齊愈手自將去㑹即時起去是時只記得吳舜從在坐司業董逌午間亦在坐未委見與不見其餘卿監郎官㑹以到局未久多不識之及根取元狀單子勘方招檢凖建炎元年五月一日赦書內一項昨金人迫脅張邦昌僣號實非本心已復歸舊班其應於供奉行事之人並與於免法寺稱宋齊愈係謀叛不道已上皆斬不分首從敕犯惡逆以上罪至斬依法用刑宋齊愈合處斬除名犯在五月一日大赦合從赦後虛妄杖一百罰銅十斤情重奏裁同奉聖㫖宋齊愈身為士大夫當守節義國家艱難之際不能死節乃探金人之情親書僭逆之名姓謀立異姓以危社稷造端在前非受僞命臣僚之比可特不原赦依斷斷命尚書省出榜曉諭吳江王份文孺云唱之者楊願也紹興中附麗秦檜為簽書樞密院命矣近又得張拭斂夫記其父魏公後語益明其風指左證之寃今備書云建炎元年大人朝南京為虞部員外郎時宋退翁齊愈為諫議大夫舊相好也南京庶事草創就置三省於行宫李公綱秉政月餘矣一日夜漏下大人過退翁省中見退翁笑曰今日李僕射有三札李公素有名譽所建明乃爾一欲盡括天下之馬其二欲括東南之民財聽富室盡輸不限以數其三欲郡增置兵大郡二千人次千五百人子以為何如大人曰胡可行也退翁曰然西北邊之馬今不可得今獨江淮以南耳其馬可用耶民財第其等限尚恐其擾況此可藝極耶至於兵假若郡增二千月費十萬緡以養今時州郡堪此邪素有額者且不能滿況外增耶某方論其不可矣復捧腹而笑出其札以示大人大人曰不可上退翁曰何也大人曰宰相不勝任論去諫官職也豈有身為相未幾上三事而公盡力駁之彼且獨不怒者公欲論其不可相耳退翁不樂曰吾故為其有餘名但欲論此三事既而語頗戾大人即退卧省中展轉曰人雖至交亦有不可言者翌日遇朝參郎省亦入見退翁上對少頃出過省門相遇望見其有得色前執手曰適奏昨札上甚喜大人搖首曰恐公受禍此始矣退翁尤慨然而去居四日而難作邦昌之挾賊以僭也在敵營議已定今載於諸録可考驗也退翁自㑹政所歸遇鄉人問之曰今日金所立者誰退翁書邦昌姓名於掌以示之而李丞相付獄觀望以為退翁丞相竟匿其藁而執李㑹章論退翁死李公旋罷相後上亦聞其詳惻然仁憫復退翁官其子己卯夏拭侍旁聞之敢私志云見之長編靖康二年二月注李忠定號為中興名相而私意害人亦復如是與夫禇河南之譖劉洎陸敬輿短竇參殆一律矣白圭之玷可勝嘆喟其後御史馬伸疏忠定之罪首以三事為言洪芻駒父等獄案亦得之陸務觀云亦是其省部散失史冊所遺者建炎元年八月十四日尚書有送到侍御史黎確奏凖尚書省劄子五月十八日同奉聖㫖訪聞昨來京城圍門王府主第及宗室戚里之家以至庶民根括金銀官司周懿文王及之余大均胡思陳沖等因緣為奸𨼆匿財物萬數浩瀚及聚斂歌樂無所不為士大夫負國至此難以一例寬貸可差黎確馬伸就臺根勘具案奏聞施行洪芻罷諫議大夫張才卿罷刑部郎中胡思王及之余大均周懿文陳沖並先已放罷今勘到具撮明白刑名下項降受朝散郎前太僕少卿陳沖著往親懿宅抄扎將王府果子喫用摘花歸家與內人同坐喫酒令內人唱曲子見牙簡𨼆匿公然受犒賞酒並錢將出剩金銀待𨼆匿入已收掌未曾收討絹六百一十五尺除輕罪外凖條監主自盜若絞刑贓罪處死除名該大赦原免緣五月十八日奉聖㫖難以一例寬貸根勘聞奏前大理卿周懿文抄札景王府喫蜜煎等摩孩羅士兒孩兒等歸家受犒設酒錢及喫宫人酒果交勸計贓六匹六尺除罪外凖條行下合杖六十公罪贓外笞五十不曾計到摩孩羅贓如不滿百文便城內竊盜杖八十如滿百文杖一百贓罪定斷後贓外杖九十罰銅九斤入官放罷在赦前合原朝議大夫前刑部郎中張才卿著起發懿親宅金銀喫內人酒果等與內人邊氏離三四步坐喫酒令內人張福喜唱曲子受犒設酒將抄扎扇兒摩孩兒等歸家受酒估贓計絹羅八匹七尺除輕罪外凖條與所部接坐合徒二年私罪官減外徒一年半罰銅三十斤入官放朝散大夫洪芻差抄扎見景王府祗候人曹三馬後囑託余大均放出將來本家同宿顧作祗候人凖條監守自犯姦合流三千里私罪議減外徒三年追一官罰銅二十斤除名勒停朝請郎前吏部員外郎王及之抄扎金銀見官屬將寧德皇后親妹追提苦辱並不施行及喫受欣王府婕妤佐酒食不鈐束覺察人吏與鄭紳家女使嬌奴等私通及犒設酒根括金銀買抵包換入已計贓二十五匹除輕罪外凖條便以私物貿易官物計利以盜論合加徒流贓罪追六官除名勒停朝散大夫前司農卿胡思推釋張邦昌表內添入諂奉語言及抄扎棣華宅有祖宗實録借看及罷館伴不合借彼馬太僕寺差到馬㸃數不見是大王府公然乘騎不見實録十冊認是親事官去失除輕罪外係不應為重合杖八十贓罪外杖六十先次據干照人說出逐人罪犯朝請郎前添差開封少尹余大均往景王府喬黃妃位抄扎到金銀與內人喬念妃並坐飲酒唱曲子以賫首金銀為由放喬奴乘馬歸家收藏作祗候人𨼆藏根括籠子一隻寄金銀庫內於內取出麝香二十臍餘被府尹納了除罪輕外總內不估到所盜麝香錢如滿十貫係監主自盜加役流遠追舉官除名勒停如滿三十五匹合絞刑贓罪除名朝奉郎主客員外郎李彛差往王府抄扎與內人曹氏等飲酒及與內人喬念奴等飲酒並坐知余大均洪芻等待顧買曹氏等放令逐便請洪芻等筵㑹令曹氏女子唱曲子除輕罪外凖條李彛係不應出謁而謁合徒二年私罪追兩官勒停案後收坐該赦原五月十八日同奉聖㫖余大均陳沖洪芻情犯深重並當誅戮各特貸命除名勒停長流沙門島永不放還至登州交割張才卿責授文州别駕雷州安置李彛責授茂州别駕新州安置王及之責授隨州别駕恩州安置胡思責授沂州别駕連州安置並依斷其後駒父渡海有詩云關山不隔還家夢風月猶隨過海身竟沒於島上又由婦人焉死甚可哀言之醜也不欲宣之有子枿字仲本亦能詩為徐師川壻嘗出知永州黃進者本舒州村人為富室蒼頭奴隨其主翁為父擇葬地於郊外山間與葬師偕行得一穴最勝師指示其主云葬此他日須出名將在旁默識之是夕乃挈其父之遺骸瘞於其所其主初不知為何人也已而逃去為盜坐法黥流又數年天下亂進鳩集黨類改涅其面為兩旗自號旗兒軍冦攘淮甸間人頗識之朝廷遣兵捕之遂以衆降後纍立功至防禦使自紹興講和以來金使經由官私牌額悉以紙覆之蓋常年之例隆興間金使往天竺山燒香過太學門臨安尹命官吏持紙往羃太學二字有直學程宏圖者襴幞立其下曰太學賢士之關國家儲才之地何歉於逺方堅執不令登梯吏以白尹尹以上聞阜陵加歎久之遂免至今循之宏圖後登第上記其姓名喜其有守擢大理司直遷丞而卒宏圖番陽人詞翰亦佳然使酒難近人多忌之乾道中趙渭磻老為臨安尹時巨璫甘升權震一時有别墅在西湖惠照寺西地連郡之社壇升欲取以廣其圃磻老欣然領命有州學教授者入議狀以謂戎祀國之大事豈可輕徇閽寺之欲易不屋之祭耶力爭之卒不能奪而止忘其姓名或云石斗陸九淵未知孰是焉錢處和紹熙甲子嵗為明州通判招魏南夫處賓館史直翁乃南夫同舍生偶罹橫逆拘係適嵗當行科舉南夫為請與處和憐之懇太守始得就試遂預首薦明年登進士第調餘姚尉復與南夫為代其後二公皆登揆路處和雖止參預然常行宰相事異哉思陵紹興乙亥歲秦檜之殂更化之初竄告訐之徒張常先而下前後凡十四人此盛德大業恥言人過仁厚之風合以付昭陵後來編纂聖政録適秉筆之臣有託其間羣從者略而不書是致讀者為之憤然近修實録乃用其徒子弟位長史局不但未必發明偉績且使秦氏奸惡殆將並掩深用歎惋髙抑崇閲紹興中為禮部侍郎忤秦檜以本官奉祀四明里中疾篤丐休致且為書訴於秦覬復職名庶幾祿及後人蓋是時有制雖侍從未復元職格其賞延故述其家困苦之狀秦覽書憐之呼持書之僕來詢其生計如何而僕者強解事乃妄增其産業以白於秦秦怒云髙抑崇死猶誑人如此竟寢其請秦亡始追賁次對而獲恤典隆興初有太學生張行簡者臨安人也嘗與同舍生遊西湖俱大醉委之而去卧於大石佛像之陰夜半月色如晝酒亦少醒有素衣婦至云妾家距此不遠可同歸少款否生領略之至其舍屋宇帷帳甚為雅潔亦有使令之屬逢迎悉如意㫖遂寓止焉由是留連數日燕飲甚歡情意既洽遂至忘歸婦曰君懷家否往返當自若也自是生造之益以膠固生曰吾家稍寬敞可以偕往否婦曰但有所礙而不可入禁城再三詢之云君誠有意可訪尋鵓梧丁二枚貼於錢唐門即無懼矣生問為何物婦曰刑人之杖瘡膏藥靨也生經營得之抱關者因疑而問焉生云有所厭勝而然耳而婦果與俱造其廬無以異於常人然自此多疾日覺羸瘠忽有道人至其門見之云君之所遇草木之妖若不舍之必有性命之虞生惶懼詢之曰此魅不敢過江且亟往浙東避之即免生從其言挈囊登舟之際婦人者踉跳㦸手岸側而詈次至㑹稽偶有同齊生延佇以處自是日向安寧積是三嵗或有勉其還家者生於是整棹西歸方登石塘婦已先在喜氣可掬遂與同歸不數月生疾復作而死竟不知為何怪也隆興三年趙汝愚廷試第一時外舅為刑部侍郎臚傳既歸明清啓云適曾稱賀否宗室魁天下今日創見可謂盛事禮宜為慶外舅擊節云班行中無人舉此今無及矣太息久之紹興乙卯張安國為右史明清與仲信兄鄭舉善郭世禎李大正李泳多館於安國家春日諸友同遊西湖至普安寺於窗户間得玉叉半股青蚨半文想是遊人歡洽所分授偶遺之者各賦詩以紀其事歸録似安國云我當為諸公考校之明清云凄涼寶鈿初分際愁絶清光欲破時安國云仲言宜在第一俯仰今十年矣主賓之人俱為泉下之塵明清獨存於世追懷如夢黯而記之左與言天台之名士也其孫裒其樂章求為序其後云政宣之際文物鼎盛異才坌出天台左君與言委羽之詩裔飽經史而下筆有神名重一時學者之所敬仰䇿名之後籍甚宦途屢彰美效藹聞薦紳著書立言自托不朽平日行事蓋見之國子虞仲容所述志碑詳矣吟咏詩句清新嫵麗而樂府之詞調髙韻勝好事者尤所爭先快覩豪右左戚尊席一笑增氣忘倦承平之日錢塘幕府樂籍有名姝張足女名濃者色藝妙天下君頗顧之如無所事盈盈秋水淡淡春山與一段離愁堪畫處橫風斜雨挹垂楊及帷雲剪水滴粉搓酥皆為濃而作當時都人有曉風殘月栁三變滴粉搓酥左與言之對其風流人物可以想像俶擾之後濃委身於立勳大將家易姓章遂疏封大國紹與中因覔官行闕暇日訪西湖兩山間忽逢車輿甚盛中覩一麗人褰簾顧君而顰曰如今若把菱花照猶恐相逢是夢中視之乃濃也君醒然悟入即拂衣東渡一意空門不復以名利關心老禪宿德莫不降伏皈依此殆與夫僧史所載樓子和尚公案若合一契君之孫文本編次遺詞若干首名曰筠翁長短句欲以刻行余為序筠翁君之自號與言其字字蓋析其名云紹興辛巳冬完顔亮自斃於揚州明年正月詔起外舅方務德帥淮西明清實從行至建康與張安國㑹於郊外安國之妹夫李瞻伯山外姑之甥鄭端本德初共途皆士子也是時得㫖令募童行往掩戰沒之骼於淮上外舅於蔣山天禧寺偕二十人以二月六日自采石共一大艦渡長江是夏孝宗即位明清與伯山德初俱以異姓𥙷官外舅安國皆正席禁路僧雛悉祝髮浮屠想是日日辰絶佳耳歐陽詩云蘇子美挽詞奏邸獄寃誰與辨髙橋客死世通悲以為用事親切而世不知髙橋客死之義後來紹興中秦禧勢方鼎盛嘗託其客陸外之仲髙問於明清偶省記得見吳地記後漢梁鴻客食吳門死於髙橋而子美亦然因以告之禧甚賞激未幾㑹之殂禧亦逝矣紹興辛酉冬仲信兄客臨安嘗觀是嵗南郊儀狀於龍山茶肆忽一長鬚偉男子衣青布袍於稠人中歎息云吾元豐五年遊京師一見之後不曾再覩今日之盛殆與昔時無異焉仲信知其異人也亟下拜俯興已失之矣紹興癸丑嵗明清任簽書寧國軍節度判官時栝蒼蔣世修繼周以獨座前資來為郡守宣城舊例每支軍食則幕職兵官俱集倉中是嵗十二月散糧明清以私務入倉小緩逮至其門見諸君聯車而出悉有倉皇之狀詢之曰通判周世詢建議欲以去嵗舊粟支其半羣卒惡其陳腐橫挺於庭出不遜語欲入白黃堂矣且衆兵隨其後明清亟止之云可復歸舊次一面令車前二卒長傳呼喻之云簽判適自府中來已得中丞㫖令盡支新米亟令專知吏往白史君告以從便宜之故於是卒徒歡呼貼服無敢譁者不然亦幾殆焉蔣守由此遂相論薦然露章不欲及也汪彥章在京師嘗作小闋云新月涓涓夜寒江靜山涵斗起來搔首梅影橫忩瘦好箇霜天閒却傳杯手君知否亂鴉啼後歸興濃如酒紹興中彥章知徽州仍令席間聲之坐客有挾怨者亟納檜相指為新製以譏㑹之㑹之怒諷言者遷之於永王綸字子霞其家嘗有神降自稱西華寶懿夫人年二十餘絶色也其形或見有二詩以遺子霞今録於左靈臺本清明花草相葳㽔宫深藏白日金堂吐華輝彈棊玉局寒鬭草珠露晞閬苑多美人形飛心不移醉眼慿春風惟有胡蝶知如何忽相失負我雲際期而今才鬢腳迤邐秋婦絲紫情祕消息行雲住無時世間苦寂寥空此隨盛衰又云洞境春色長人間春未早西真不剪天外花東君自戮雲邊草玉女銲蕚香滿枝碧玉養根紅落稀玉樓臺二十里花盡桃梅李凌風人去鶴不還萬年依舊瑤池水闌干有曲通太無寶井霞牽金轆轤風回紫繖繡衣卷流金影轉烟鸞孤可憐世事杳難盡至道雖無眉睫近埃塵㸃染空自悲此時不來來何時字畫尤佳今尚藏子霞所雖置在太白詩中誰復疑其非耶靖康丙子何文縝栗相敵騎初退時議欲率文武百僚拜乞乾重節上壽文縝命吏部郎中方允迪元若為三表才上即允所請後二表不復用文縝與允迪大稱嘆賞不已且云恨不果用然常誦佳句於百僚之上也今列於後第二表云立為天子肇興黃帝之英姿請祝聖人允執唐虞之謙柄載陳悃愊兾動淵衷中謝恭惟皇帝陛下勇智生知聰明性稟東宫主器盛德久孚於寰瀛內禪應圖大計果安於社稷勵精為治側身修行儉奉己而厚事親寬御衆而亟承祖維震夙之令旦萃晉師之歡呼五百嵗為春秋寧俯稽於南楚一千年而華實盍還取於西池何睿意之勿休當縟儀而固拒伏望昭一人之有慶納萬壽之無疆陋彼太宗南嚮辭而必再超乎孝武中嶽呼而止三幸賜俞音或從公願第三表云節紀千秋歸美洊形於剡牘享加三夏隆謙再却乎舉觴效罄輿情頻干震聽皇帝陛下兆於變化生而神靈學履武誕彌之辰應虹流長發之瑞盡仁皇之忠厚指發乾元於向辰自有仁祖之聰明數同天於過信正心誠意勤儉邦家地闢天開而除妖灾雷厲風行而成功治龍樓問寢欣西宫鳴蹕之還虎符發兵至北鄙控弦之逺式全丕搆允謂中興豈有首臨蘭殿之期而當力拒華封之祝伏望皇帝陛下制行不以已斂福用錫民登五咸三偉示茲之高宴桑田東海協稱壽之歡謠罔達就日之懷克受後天之算玉照新志卷五
