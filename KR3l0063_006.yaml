body:
  text: 玉照新志卷六宋王明清撰陳橋驛在京師陳橋封丘二門之間唐為上元驛朱全忠縱火欲害李克用之所藝祖啓運立極之地也始藝祖推戴之初陳橋守門者拒而不納遂如封丘門抱關吏望風啓鑰逮即帝位斬封丘而官陳橋者以旌其忠於所事焉後來以驛為班荆館為北使迎餞之所至宣和五年因曾讜一建言遂命羽流居之錫號曰鴻烈觀俶擾之後又不知如何耳宋咸茂談録云祖宗以來殿試用三題為以先納卷子無難犯者為魁開寶八年廷考王嗣宗與陳識齊納賦卷藝祖命二人角力以爭之而嗣宗勝焉嗣宗遂居第一名而以識為第二人其後嗣宗帥長安种放自從官歸終南山舊隱一日嗣宗往訪之放命諸姪羅拜而嗣宗倨受之放以為非而誚焉宗怒云舍人教牧牛兒時嗣宗已狀元及第矣放曰吾豈與角力兒較曲直耶遂至忿爭事既上聞詔放徙居洛川以避之已上宋録中云而司馬公涑水紀聞乃云嗣宗與趙昌言角力而勝昌言乃太平興國四年胡旦榜第二人嗣宗廷試所爭乃陳識溫公所紀誤嗣宗是嵗以橋梁渡長江為賦題蓋當年下江南一時勝捷故耳蔡襄在昭陵朝與歐公齊名一時英宗即位韓懿公當國首薦二公同登政府先是君謨守泉南日晉江令章拱之在任不法君謨按以贓罪坐廢終身拱之望之表氏同胞也至是既訟寃於朝又撰造君謨乞不立厚陵為皇子疏刋板印售於相籃中人得之遂干乙覽英宗大怒君謨幾陷不測魏公力為營救事見司馬公齊記及歐公奏事録記之甚詳君謨終不自安乞補外出官杭州已而憂去終故魏公與君謨帖云尚抑柄用此當軸者之愧也親筆今藏吕子和平叔處先祖舊字子野未登第少年日攜歐公書贄見王文恪於宛丘一見甚青顧云某與公俱六一先生門下士他日齊名不在我下子野前已有之當以吾之字為遺先祖遂更字樂道先祖位雖不及文恪而名譽籍甚於熙寧符祐之時文恪長子仲弓實韓持國壻持國夫人實祖母親姑由是情益稔熟仲弓之弟即幼安始名寧後以有犯法抵死者故易名襄而仍舊字靖康初以知樞密院為南道總管先人為屬偕行有督勤王師檄文薦紳多能誦之秦檜初擢第王仲峘以其子妻之仲峘後避靖康諱改名仲山仲山朴魯庸人也禹玉子而鄭達夫禹玉壻達夫之室蓋檜妻之親姑也達夫當闕處以密州教授翟公巽為守前席之代還薦於朝得學官已而夤緣鄭氏中宏詞科吳幵力薦其才學後於靖康中張邦昌使金猝置為屬以行邦昌使還拜相屬吕舜徒好問薦引入臺至中司金人尼瑪哈妄思易置君位監察御史馬伸首倡大義上書尼瑪哈言其不然檜為臺長列名于前遂怒拘檜與其妻王氏於北方檜既陷敵無以自存張遜於金之左戚烏舍之門烏舍素主和議者也凡經四載乃授旨意得其要領約以待時而舉密縱之使挈其妻航海南歸抵漣水軍敵始至淮上既退郡人推土豪丁超者領郡事敵至遂殺超敵退衆復超子祀領軍事年方十八九矣祀假舟至楚州令典客王安道偕行幾為郡守楊揆所斬賴揆之館賓管當可救之得免時蘄王世忠駐軍髙郵會之不敢取送於彼復自楚泛洋至會稽入三江門思陵方自溫州乘槎入越暫以駐蹕富季申為中丞露章乞還其職於檜亦懷其前日之忠即從其請尋登政府繼拜右揆引公孫為參政季申為右府富翟二公後卒不合而紛競二公罷政然悉存其職名示以報德檜乃建北客歸北南人留南之䇿蓋欲與烏紳相應大咈人情遂從䇿免故制云自詭得權而舉事嘗聳動於四方建茲居位以陳謀首建明於二䇿罔燭厥理殊乖素期禠職告去聳動四方之聽朕志為移建明二䇿之謀爾材可見投間屢嵗吕頥浩趙鼎張浚皆為相主戰者也適酈瓊以市州叛聲逺以弗績罷尼雅滿誅死劉豫廢斥烏紳大用事思陵亦厭佳兵檜起帥浙東入對之際揣摩天意適中機會申講和之謀遂為己任大契淵衷繼命再相以成其事凡敵中按籍所取北客悉以遣行盡取兵權殺嶽飛父子其議乃定逮太母回鑾卧鼓減鋒逾二十年此檜之功不可掩者也故洪光弼於稠人廣衆中昌言悟室托其寄聲之語切中其病乃遭逺竄及夫求表勳之後藉敵之勢權傾海內不知有上鈐制中外脅持薦紳開告訐之門興羅織之獄士夫重足而立使其無死奈何此檜之罪不可逃也紀之於帙可不戒哉其後挽達夫之子億年視儀政幵以滔天之罪流放南州既放逐便卜居於章貢以其壻曾慥作郡守王安道為江淮守帥以祀為觀察使邦昌家屬悉得還浙中皆酬私恩也秦檜既殺嶽氏父子其子孫皆徙重湖閩嶺日賑錢米以活其命紹興間有知漳州者建言叛逆之後不應留乞絶其所急使盡殘年秦得其牘令札付嶽氏而已士大夫為官爵所鈎用心至是可謂狗彘不食其餘矣不欲顯言其姓名以為薦紳之戒明清前志紀孫仲益童子之年對東坡之句得之仲益子長文云其家世居毗陵之洛社蓋仲益之先人教村童於市中東坡元祐四年自禁林出牧杭州時也案仲益以辛酉生是嵗八嵗也近觀周益公仲益之集序云得之於葛常之立方所著韻語陽秋且辨之云東坡自南海歸時仲益已年二十一矣當是元豐乙丑自汴過常州時東坡自黃州內徙未始至洛社而海南歸終毗陵由是知葛周説皆非當以長文之言為正也東坡南遷北歸次毗陵時久旱得雨有里人𡊮點思與有一絶云青蓋美人回鳯帶繡衣男子返雲車上天一笑渾無事從此人間樂有餘書以呈坡大喜為之重寫且以手柬褒之至今𡊮氏刻石藏於家點後仕至朝請大夫以名才典郡云仲彌性並淮上知名士也登第之後諸侯交辟久之得通判湖州楊娼韻者以色藝顯名一時彌性惑之誓與偕老韻以誕日嘗作醮供彌性為代作醮詞云身若萍浮尚乞憐於塵世命如葉薄敢祈祐於玄穹適屆生初用輸誠曲妾緣業如許流落至今桃李本半殘何滋於苑囿燕鶯今已懶空鎖於樊籠隻影自憐寸心誰諒香爐經卷早修清淨之緣歌扇舞衫尚挂平康之籍伏願來吉祥於天上脫禁錮於人間既往修來收因結果辟纑織履早諧夫夫婦婦之儀墮珥遺簮免脫暮暮朝朝之苦人之所願天不可誣仲楊此事雖甚親切然黷穹甚矣尋即俱去適王承可鐵為郡守與之啓云方將歌别駕之功聞已泛扁舟之樂已而彌性坐廢二十餘年逮秦檜殂始獲昭雪入丞光祿出守蘄春以疾終於淮東儀幕嘉祐末有一人攜一巨魚入京師而能人言號曰海多衒耀於市井間豪右左戚爭先快覩亦常召至禁中由是纒頭賞賫所獲盈積常自聲一辭云海多風措被漁人下網打住將在帝城中每日教言語甚時放我歸去龍王傳語這裏思量爾千回萬度螃蟹最恓惶鮎魚尤憂慮後李氏園作場躍入池中不復可獲是歲黃河大決水入都門壞民室宇數百家已而昭陵升遐熙寧辛亥壬子聞武侯事忘其名以供奉官為汾州管界巡檢一日捕盜入九疑山深歷巖洞人迹罕到忽瞻絶嶺路窮不可上徘徊民舍遙見嶺中間有青煙一點了然可辨指示村民云居常見之但不知何人取燎樵夫牧子皆不能到李識其處歸以告同姓李彥髙者李君業文志未就嘗以養生不死為意每聞有方士異人必訪之與遊處去者皆此類恨未有得也聞侯言頗喜即裹糧同行詣之至其所則緣嶺尋煙起處攀躋而上忽得平地有草堂三數間叩門入見一老人燕坐其中忽覩李君驚相謂曰何為至此此非人迹可到也李揖前敘以久慕仙道聞所聞而來老人笑揖與之坐李問老人姓名吾唐末人因離亂避世隱居名山來此亦三五十春秋矣姓邢名氏不必問因問李曰吾避世久不接人事聞今國號宋不知天子姓氏傳代幾葉年號謂何又指前面二小池仍有竹筒作刻漏狀曰從來甲子日辰吾盡知之今日乃何日所不知者國姓年號耳李因盡告以熙寧天子姓名傳序年月仙老頷之而已李又問仙老居此既久曾略下山乎曰從此凡三下山因叩以仙經道術曰此當修養自到難以口耳傳授但以修身治性凡為人倫慈愛忠信告之李糧盡乃歸又數日即為五日糧裹之而至復至其所其人笑喜問勞李遂留五日復叩之則告以吐納鍊養之事與坐語倦則援琴鼓之則聲非世間之音李絶不能辨其曲操但覺草堂中如雷濤之聲既罷而餘韻不絶也左右凡四窗長几上文史如世間書李竊窺之皆墨字天古文間以朱字如刋正校讐者李皆不曉糧盡又歸數日又攜五日糧以往仙翁復笑延之如故漸無間矣李復叩之遂授以內丹真訣因謂李曰吾以天上校對仙書自有程課不須復來恐妨吾事吾亦不久徙他處矣李問以窗間道書云此皆仙房所有天上書凡係仙籍者皆分校勘此吾所校已則歸之别給他書也因贈李十二詩臨行又書一絶皆天古文李初莫能識其後竟不往復莫知所之也李得詩凡與同志或吾徒中善𨽻者討尋十八年方盡十三篇遂以傳世李今在汾湘間頗有所得但人無知者耳詩列其題云詩贈晚學李君虛皇天詔下仙家不久星橫借客槎壁上風雲三尺劍林前龍虎一爐砂行乘海嶼千年鶴坐折壺中四季花為愛陰符問玄義更隨驪海入煙霞久掩山齋看古經但矜猿鶴事髙情爐中且喜丹砂死巖下近聞朱草生堪鄙塵寰馳妄理莫教流俗聽希聲清溪有路無人識獨弄滄浪一濯纓詰曲川原幾里深偶尋巖壑在前林長懷萬古典墳樂果稱幾年泉石心將看道經延白日偷收巖藥化黃金山中所訪逍遙客為報白雲深處尋人稀境盡絶塵埃野客尋源或到來怪石結成真洞府亂山堆就假樓臺久窮至理難期老獨放真機學未該得共山翁話虛寂不妨巖下且徘徊翠微堆裏隱雲煙石縛藤蘿小洞天常丹符驅木魅每呼山鬼汲溪泉養成玉座千年石煉過河車九轉鉛記得潛虛真伴侣出門爭贈買山錢秋景澄清物象希山家沈寂俗難齊常聽嶺瀑連雲㵼時有林猿隔岫啼月黑笈明靈武動夜寒囊破蹇驢嘶此身已脫人間世贏得煙蘿自在題丹雄初伏匱方靈萬里蓬壺第一程神室下封添夜火金砂新浴煉真形稚川篋裏藏丹訣鴻寶方中檢藥名既得仙人小龍虎便尋根本到長生旋滴巖頭石裏泉研硃將點洞靈篇只看壁外數千卷勝走人間三百年何事投心求妙友便須窮力到真仙竹間松徑逍遙境雅使仙翁恣意眠眼前龍虎實紛紜説破丹砂世莫聞故脫衣冠尋舊隱便將猿鶴入深雲間編野録前朝事靜校仙經古文滿腹分明惟是識塵寰誰認紫陽君無言隱几閉松扃萬古襟懷獨自靈點筆時研三卷彈冠嘗動一簮星青童去撅南山木野客來尋北帝經天道不須窺牖見滿門山嶽自青青山家何物是知音也勝人間枉用心學就萬年龜喘息習成千嵗鶴呻吟沖和久養靈通獸關節常調不死禽獨對翠微誰更問鼎分三足伴光陰世事功名不足論好乘年少入真門渾如一夢莊仙蝶況是千年柱史文須向黃庭分內外不交周易祕乾坤他年陵谷還遷變家住蓬瀛我尚存外有絶云日轉蓬窗影漸移羅浮舊隱到多時瀛洲伴侣無消息風撼巖前紫桂枝靖康元年金人初犯京師种師道為宣撫使李伯紀以右丞為親征行營使伯紀命大將姚平仲謀劫敵寨數日前行路皆知之敵先為備初出師以為功在頃刻令屬官方允迪為露布忽報失利上震驚於是免伯紀師道亦罷復建和議江彥章靖康詔旨云方會之文非也今列於後臣聞天生五材自古無去兵之理武有七德聖王以保大為先蓋中國之撫四方猶上穹之統羣物必春生而秋殺當仁育而義征故黃帝神靈爰親征於涿鹿髙宗嘉靖尚逺克於鬼方夏禹舞干而格有苗周宣飭車而伐玁狁著在前籍蔚為顯庸矧當真人勃興昌時全盛憤四郊之多壘赫一怒以安民爰鋪張於洪休以明示於德意恭惟陛下勇由天錫聖本生知挺表正萬邦之資擅冠帶百蠻之勢王者大一統會茲御極之年中國有至仁盍效充庭之貢乃連叛將共縱野心始盜燕雲之七州旋陷濬邢之兩郡敢踰天險竟窺日畿負上皇不資之異恩恣其悖悔意天朝久安而弛備可以慿陵驟驅馬羣輒攻雉堞注飛矢以如雨僅比射天倚長梯而侵雲難於超海盡矣矢石之技屹然金湯之雄遂少却以暫休假請和而驕索求五府叵儲之金帛割三鎮難棄之土疆且質宰臣仍要帝䇿惟兼憂外敵之生命深軫淵衷不曲從近弼之逺猷勉徇溪欲謂我怯懦愈懷貪婪斂重賂而弗厭散輕兵而益騁蹈籍我州縣驚擾我三輔虜掠我人民爭攘我牛馬三鼓而竭旗轍先奔千里者飢樵蘇後㸑但知逞其壯氣不自善其歸途可破之形有識共見臣恪遵睿訓大整軍容近越三旬之間式備六師之衆威名無素敢期草木之能兵號令所加庶幾旗幟之改色數出精鋭分據要衝擁旄之宿將鼎來勤王之勇士霧集正月某日某官种師道統若干人來某日某官姚平仲若干人來某官种師中統若干人來諸處將兵排日以列於此以誇大之各懷義概願淨妖氛奮不顧身古之名將弗過前無橫陳誓難與彼俱生馳逐習而進止間約束明而申令熟御得其道而咸足使慮善以動而惟厥成以戰誰能禦之有禮其可用也籌運玉帳無亡矢遺鏃之勞氣吞沙場斷匹馬隻輪之返二月一日計議已定部分最嚴是夜子時范瓊領二千騎銜枚而西斫營以入致羣營之自擾引大兵而夾攻殺氣干霄呼聲動地臣於是時躬帥禁旅嗣承德音出榮德門至班荆館既親行陳而督戰亦度緩急以濟師蜚廉效靈鼓疾風而向敵回祿助勢扇烈火以燎原天道甚明人心爭奮掃崖穴之盤結變灰燼於須臾臣又分兵以解范瓊之圍遣騎以助平仲之進疾如破竹順若建瓴觀獲醜之繼來信犂庭之可得道窮矢盡糧絶人飢走尚占於即禽鬭猶向於困獸三日卯時復出師而載戰圍其壘者數重士怒益張馬逸不止競執俘而折馘紛蹀血而履腸其日午時某人先遣衛兵等三百易康王從行之人出不意挾康王上馬由其門以歸衆智同孚神謀間發全棠棣之愛副鶺鴒之求子儀見虜之誠斯焉可擬平原歸趙之計彼若亡奇其日申時某人擒獲叛將藥師𠞰厥渠魁垂街張不漏之網生致反虜下吏責未酬之恩凶徒潰而冰消餘衆驚而鳥散亟加追躡寧俾逋逃寶貨詎存荀進詎慙於馬齒武威方用萇洪未議於虎皮遂收十全之功何謝八先之略臣載惟上帝以警晉佑宋睿主以昌唐應天日表龍姿夙膺神與之異風聲鶴唳助成師至之威豈容小醜之迷昏未知初政之精勵臨事而懼雖有在庭之合辭惟斷乃成盡出當陽之獨運果因多算遂奏膚功挽天河以洗甲兵裂屬國而夷坑谷受命清廟方定謀以出征飭喜端門俄大獻而奏凱火通甘泉而啓大帝騎至渭水而激太宗故知王業之難允發天顔之喜折隨何而置酒效豈專於用儒賀小白而舉觴請無忘於在莒猥參邇列初乏長才聖謨洋洋上稟新書之妙虎臣矯矯旁資羣䇿之良不敢貪天以為功正欲與衆而偕樂臣無任瞻天望聖踴躍慶快之至差某官奉露布以聞建炎己酉奉康志升允之帥浙西辟先人入幕府時髙宗南幸先人揣知禍亂未已是後敵騎果至所道之境悉如先人言今載於後某聞及其時而弗思之而不及此天下事所以大壞而不可救藥也先事而圖者非利害有以見於外英明有以主於內則紛紛滿前一是一非何以適從此賤子瞽言冀於信察也自以蒙召公孫遇有日矣賓筵初試有蒙辟置恩德重大非特一已知之士大夫傳以聳動也服辭去厲色不以為忤未忍默默以負於門下也切惟朝廷以錢塘重鎮付與左右撫綏制置重任兼而有之明公虔奉睿意令以威駕風馳電駛懲惡護善百廢俱起千里之間歌頌載塗杭民圖像以事明公既保令名而與俱矣則圖惟厥終所謂國之安危其可忽哉某仕於此為日滋久以覽觀山川考驗圖史輒有以為耳目之助而非苟然也杭州在唐雖不及會稽姑蘇二郡因錢氏建圖始盛請以西境言之北有常潤下連大江浙西觀察使治所在京口蓋相距數百里形勢也其東滄溟雖海山際天風濤豪壯然海門中流至淺狹不可浮大舟匪敵騎能窺其南則浙江以限吳越惟州西境無大山長川虛怯可虞錢鏐本臨安人始因宣歙羣盜米直曹師雄作亂自鄉里起兵保臨安其勢漸盛後遂以兵敗黃巢於八百里威名益振遂分建八都於兩境精兵各千人互相䇿應新城縣聖安都杜稜守之富陽縣靜江都聞人宇守之臨安縣石鏡都董昌守之餘杭縣龍泉都凌太舉守之鹽官縣海昌都則徐及北關鎮則劉孟容臨平鎮則曹信浙江鎮則阮結又靈都兵馬寨童泉臨安援建八都堂於府第日與賓幕聚議至建霸府也纍世皆大興佛寺於西湖匪特祈福為觀美而已實據諸峰之險為候望也結婚四郡犄角以備江南蓋錢鏐本臨安人故知形勢為盡由今觀之今昔雖異利害一同自餘杭無五十里城名霍山平路如砥可徑抵城下今日議者惟於蘇潤二州置帥宿兵不知西境乃先務也某愚過計萬一敵過江陵不可攻直抵安吉廣德以搖錢塘則數百里響應是邦危矣伏望台慈察一方之大利從邦人之至順考八都舊迹别行措置使金陵宣歙與我相表裏出兵據險守要事無不濟餘杭臨安兩邑土豪比諸邑最為驍鋭擇其守令例假一官以鼓舞之使扼其要路逾於金湯矣某少遊蒲中觀張睢陽畫像切歎其眉宇英威凜然真足以定睢陽矣況其胸中哉今明公文武忠孝屛翰王室保斯人以更生又朝奏夕下與聖旨相唯諾何惜建此於朝而始終錢塘之人也今皇輿新渡浙江明公能自大振軍威連糾江東挫其賊鋒較之輕重張睢陽何足道哉有守禦圖一本隨以為獻犯分妄言無以辭誅或稍因間暇呼之使前更畢其初説又幸矣曽吉父早嵗入館然平生不曾關升後來雖有監司郡守猶帶權發遣也吉父為廣西漕嘗舉其屬吏姓黃者改官赴部告行忽吉父云有一事久擬奉白先生早往下關升於門下實有利害耳曽氏父子每與客言以資一笑徐敦立守滁有郡博士葛鎮者欲上書於朝乞將王安石親黨盡行竄謫以副本呈似敦立笑云度之斥謫不足道然公却有利害鎮詢其説敦立笑云度乃王氏壻倘從公言折了一紙舉狀矣鎮赧然二事相類故記之詩話云昭陵時近臣賦詩一聯云秦帝宫成陳勝起明皇殿就祿山來或有譖於九重上覽其首句云朱衣吏引上高臺即不復視天語以為器量如此何足觀耶嗚呼昭陵豈不見全篇倘盡以過目則不可回互矣此堯舜之用心宜乎享國久長也玉照新志卷六
