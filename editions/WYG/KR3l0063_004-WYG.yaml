body:
  text: 王照新志卷四宋王明清撰高公軒者宣仁之疎族也政和末爲滄州儀曹考滿哀鳴於外臺及將曰自唯孤寒無從求知於當路但各乞一改官照牒障面而歸以張鄉閭足矣人皆憐而與之旣至京師乃詣部自陳薦狀已足乞以照牒爲用先次放散適有主之者從其說而施行之遂冐改秩蔡元長時當國聞之遂下令今後不得妄發照牒公軒中興後爲檢正諸房文字外祖曾空青政和中假守京口舉送貢士張彥正綱宣和末守秀水舉送沈元用晦紹興間牧上饒舉送汪聖錫應辰三人皆爲廷試第一其後舅氏曾宏父知台州鹿鳴燕坐上作詩以餞之末句三郡看魁天下士丹丘未必墜家聲是嵗天台全軍盡覆事有不同如此者沈元用文通孫也初名􅇐家於秀之崇徳縣坐爲人假手奏案至裕陵榻前上閱之云名見梁四公子傳此人必不凢可從闊畧時方崇道敎故也遂降㫖令今後不得入科場而已徬徨無所徃時外祖守秀城舅氏宏父爲湖州司録來省侍妓長楊麗者才色冠一時舅氏悅之席間忽云有士人沈念六者其人六藝絶倫不幸坐累遂無試頭奈何宏父云審如君言吾合牒門客一人尚未有人翌日訪舅氏一見契合易其名曰晦是嵗漕司首選明年爲大魁才數月卽入館爲郎奉使二浙經由嘉禾麗張其徒曰我今日迺徃庭參門生耶張子韶凌季文俱武林人少長同肄業鄉里宣和末居清湖中時東西兩岸居民稀少白地居多二人夜同步河之西見一婦人在前衣妝楚楚因縱步覘之常不及焉至空迥處忽見囘顧二人而笑真絶色也方欲詢之乃緩步自水面而東二人驚駭而退王磐安國合肥人政和中爲郎京師其子婦有身訪乳婢女儈云有一人丈夫死未久自求售身安國以三萬得之又三年安國自國子司業丐外得守宛陵挈家之官舟次泗州一男子喝於轎前云乳婢之夫也求索其妻安國驚駭欲究其詳忽不見歸語乳婢亦愕然無說至夜乳婢忽竄去遍索不可得詰旦舟尾乃見尸浮於水面元符末巨公爲太學博士輪對建言比因行事太廟冠冕皆前俯後仰不合古制詔行下太常寺中奏云自來前仰後俯必是本官行禮之時倒戴之誤哲宗顧宰臣笑云如此豈可作學官可與一閒散去處改端王府記室㕘軍未幾端邸龍飛風雲感㑹至登宰席寵禄光大震耀一時禍福倚伏有如此者李漢老邴少年日作漢宫春詞膾炙人口所謂問玉堂何似茅舍疎籬者是也政和間自書省丁憂歸山東服終造朝舉國無與立談者方悵悵無計時王黼爲首相忽遣人招至東閣開宴延之上坐出其家姬數十人皆絶色也漢老惘然莫曉酒半羣唱是詞以侑觴漢老私切自欣除目可無慮矣飲大醉而歸又數日有館閣之命不數年遂入翰苑江緯字彦文三衢人元符中爲太學生徽宗登極應詔上書陳大中至正之道言頗剴切上大喜召對稱㫖賜進士及第除太學正自此聲名籍甚陸農師爲左丞以其子妻之政和末爲太常少卿蒙上之知將有禮簉之命時陸氏已亡再娶錢氏秦魯大主女也偶因對揚奏畢上忽問云聞卿近納錢景臻女爲室亦好親情言訖微笑是晩批出改除宗正少卿彦文知非美意卽丐外出知處州由是遂擯不復用明清揮麈餘話載馬伸首乞立趙氏事後詢之游誠之凢言與前輩說有異同者今重録其所記於後靖康初秦檜爲中丞馬伸爲殿中侍御史一日有人持文字至臺云敵軍前令推立異姓來未及應語之間馬遽云此天位也敵人安得而易舍立趙氏其誰立秦始入議狀連名書之已而二帝北狩秦亦陷焉獨馬公主臺事排日以狀申張邦昌狀云伏覩大金太宰相公權主國事未審何日復辟謹具申太宰相公伏乞指揮施行至康王卽位日乃止有門弟子何先者邵武人字太和嘉王榜登第少師事馬公其後秦檜南歸擅立趙氏之功歸已盡掠其美名取富貴位極公槐勢冠今古何公常太息其師之事湮没欲辨明其忠每引紙將書輒爲其子所諫以謂秦方勢燄震主豈可蹈危機掇家禍然何公私自爲馬公行狀一通常在也紹興甲戌以左朝奉郎任辰州通判將滿一夕忽夢馬公衣冠相見與語如平生親旣寤喻其子曰馬先生英靈不没齎恨九泉如此有意屬乎掛其遺像哭之其子鎬哀勸不從因告其父曰俟斯人死上之未晩太和曰不然萬一我先死瞑目有餘恨後日當受代卽手書一狀聞於朝其詞尤委曲囘互但云自太師公相陷北之後獨殿中侍御史馬伸排日以復辟事申邦昌云云且以所作行狀繳納乞付史館立傳以旌其忠入馬逓馳達然後解組以歸秦得之怒凢一路舖兵悉遭痛治仍下廷尉追捕何公甚急獄吏持文移至邵武而太守張姓者驚愕罔措就坐得疾越翌日始甦扶掖至㕔事才啓封視牒則所追者左朝奉郎何先也方遣吏徃村落追赴以行旣對吏而栢臺考吏已先在􅁄寺但謂靖康雖有馬伸爲殿院未甞聞有此狀也令臺吏勒軍令狀􅁄寺以上書不實擬降一官罷前任思陵重違檜意聖語曰所擬太輕特追兩官羈置英州蓋紹興甲戌嵗也後一年乙亥檜死日御批何先所犯委是寃枉令有司别定遂復元官放逐便仍理元來磨勘爲左朝散郎何在貶所皆無恙歸至里門遇親戚相見喜馬公之事明白一笑病廢朝廷雖欲用之弗起僅能食祠官之禄一年而已鎬乃誠之姨夫是以知其詳及建寧諸鄉老長搢紳之與何太和相厚者皆能言其事明清近又得伸上邦昌全文用列於後云伸伏見金人刼二聖北行且逼太宰相公使主國事相公所以忍死就尊位者自信金兵之退必能復辟也忠臣義士不忍就死城中之人不卽生變者亦以相公必立趙孤也今兵退多日吾君之子已知所在獄訟謳歌又皆歸徃相公尚處禁中不反初服未就臣列道路傳言以謂相公外挾強敵之威使人游說康王自令南遁然後據有中原爲久假不歸之計伸知相公必無是心但爲敵人所迫未能盡改雖然如此亦大不便蓋人心未孚一旦喧閧雖有忠義之心相公必不能自明滿城生靈必遭塗炭辜負相公之初心矣伏望速行改正易服歸省庶爲稟取太后命而後行仍亟迎奉康王歸京日下開門拊勞四方勤王之師以示無間内外赦書施行恩惠收人心等事權行拘收候立嗣君日然後施行庶幾中外釋疑轉禍爲福伊周再出無以復加儻以伸言爲不然卽先次就戮伸有死而已必不敢輔相公爲叛臣也邦昌於是始下令一切改正明清揮麈後録載周迎所記陳堯臣決伐燕之策蓋出於天下公論而堯臣之子倚才横行行都張全真參政日載真僞作一帙可以但作全真文字近覽李仁甫長編云紹興元年正月十四日辛丑中書舍人胡交修言人臣之罪莫大於誤國誤國之禍莫大於燕雲之役者燕山議首與夫用事之臣大者誅戮次者流放而堯臣者獨仍舊故秩廩食縣官置而不治豈所以上慰宗社之神靈下泄四方之痛憤哉堯臣爲國召亂不知罪惡之重乃敢自引矜乞爲郡守今雖爲宫祠叨切食禄臣愚伏望睿㫖削奪堯臣在身官爵投竄遐方以懲其惡以謝生靈爲後世臣子之誡詔堯臣主管臨安府洞霄宫指揮更不施行書之於編葢知迎之言不厚誣且非明清之私意事見長編第一百五十九之註後閱中興日厯宰執奏乞行遷責髙宗云豈可以自乞差遣反遭貶邪止罷祠焉王彦國獻臣招信人居縣之近郊建炎初金人將渡淮獻臣坐於所居小樓望見一老士大夫徬徨阡陌間攜一小僕負一匣埋於空迥之所獻臣黙然識之事定徃掘其地宛然尚存啓匣乃白樂天手書詩一紙云石榴枝上花千朶荷葉盃中酒十分滿院弟兄皆痛飲就中大户不如君獻臣後南渡寓居餘姚嘗出以示余真奇物也後聞以歸劉綱公舉矣又云建炎間避地奉化境上一二僕𨽻偕行嘗夜過渡月色微明有數人先徃焉忽問云非王獻臣解元行李否但見其軀幹長大語聲雄勵心竊疑之忽徑劃水面而渡彼岸波濤洶湧久之獻臣惶怖幾觸見不知爲何怪後亦無他胡偉元邁新安人也攜其父舜申所述乙巳泗州録己酉避亂録二書相示敘俶擾時事今列於後乙巳泗州録云宣和乙巳予家寓居泗州之敎授㕔適在寳積門出門卽淮河有友一二人在南山如鄭況仰荀其父爲發運司屬官􅅟宇在焉以故無三五日予不至南山常時至彼講論文字是時朱勔父子正得志勢位炎炎每上下京浙則託徃來降御香其實欲所過州縣將迎之勤也是年秋朱汝賢自浙中來以降御香泗州官吏迎於陡山􅈝山出城四里許在淮西南岸過是無路可行故止於此邀迎其船汝賢傳指揮到城中亭子上相見官吏皆迴候於亭及船至亭通名典謁者曰承宣歇息矣俟久之令再通曰睡着矣抵暮方見守倅而已傍觀者見其驕傲皆爲之不平予輩時談此事於南山曰我輩恐未死且看朱勔父子終竟如何其後金人入冦抵都城上皇避位日聞京師事不一未幾朱勔首以小舠子東下曰勔已放歸田里矣不敢出見人人亦不顧之日有京師權貴與中官下來者頗多皆着皁衫而繫皁縧行於街市又幾日曰上皇已在發運司行衙矣人初不信及徃觀但見船一隻泊於河步以結激壁矢張於船前問之上皇果在衙中侍衛蕭然又數日軍馬纔到市上皁衫貴人益多凢前此聞所貴倖官侍之用事者問之徃徃在焉俄又聞童貫亦至或有見坐惟帳中黑肥軀幹極大者問之童大王也軍馬至皆渡淮駐於南山後聞髙俅於南山窄隘俅之弟伸亦同在彼因普照覺老請齋於南山始知之是時也窄隘南山卽已棄淮之北矣實今日之吉兆亦自東京來至南山無控扼之所也俄又聞上皇登發運衙城上之亭觀漁人取魚於淮又旬日上皇移幸而南自是京師士民來者日夕繼踵益知敵兵叩城之事以上皇益南侍衛自京師而至益盛一槖駞踏浮橋傾倒遂入淮中以負物之重恐必不救也又閱歲時上皇駕還皆親至塔下燒香每入寺寺中人皆驅出施僧伽鉢盂袈裟至親與着於身先是以普照寺大半爲神霄玉清宫至是御筆畫圖以半還寺寺僧送駕出城得御筆歡喜上皇初至之時寺之𦂳要屋宇還之益多始所還道流盡拆去門牕及再還卽幷所拆門牕得之道流褫氣矣明年秋余同弟汝士徃國學赴試汝士預薦而余遭黜獨還泗州侍親時伯兄汝明再爲監察御史汝士寓南臺公􅅟以待省試以再遭圍悶病幾死蓋國學諸生例患脚氣故染是病也使予是年預薦必死於京師及聞太原失守知淮泗不可居借船於發運方孟卿遂得親來湖州船纔過閘卽潮落不可復開而泗州尋亦亂矣嗚呼金人慿陵國家顛危實上之人爲權倖誘惑造成此禍而勔一人亦在數蓋勔乃姑蘇市井人始以髙資交結近習進奉花石造御前什物積二十年職以充進奉監司守令或忤其意以故違御筆繩之應造什物皆科於州縣所獻才及萬分之一餘皆竊以自潤及分遺權倖以邀恩寵故勔建節旄子侄官承宣觀察使下逮厮役日爲横行媵妾亦有封號勔與其子汝賢汝功各立門户招權鬻爵上至侍從下至省寺外則監司以至州縣長吏官屬由其父子以進者甚衆貨賂公行其門如市於是勔之田産跨連郡邑嵗收租課十餘萬石甲第名園幾半吳郡皆奪士庶而有之者居處園第悉擬宫禁服食器用上僭乘輿建御容殿於私家在京則以養種園爲别業徙民居以爲宅所占官舟兵級月費錢糧供其私用及上皇禪位放歸田里其假道泗州也遽蔽船門惟恐人知之亦無面以見人未幾安置廣南籍没財産旣而取首級家屬悉竄以此觀之宜乎召金人之禍而致國之危焉然所以造禍者豈止勔之一人哉因思宣和間京師奢侈正盛一相識言曰書之内作色荒數語古人法度之嚴如此是數者有一則必亡豈有兼是數者而復有逾於此者安得無禍乎靖康果有其應或曰若如此而無禍則古人之言必妄詩書皆不足信者而喋費辭說自念老矣切慮遺忘遂追思所見筆之於冊云避亂録建炎己酉先兄待制諱舜陟字汝明帥建康與右丞杜充不相能充時領兵駐建康充自遣將來奪取經制司錢物待制聞於朝充徃徃亦知而後奏朝廷知二公不合十月移待制兩浙宣司參謀時周望自樞府出爲宣撫望老繆本由八行舉與論軍事卒不合先有㫖令堅守平江所措置初無可守之計待制有奇謀皆不用敵自廣徳由安吉抵錢塘渡江破明越北還假道平江所措置初無守禦者皆知必敗矣待制謂望本司金帛旣盡爲金人所得曷若爲攜徃崑山庶可存也望旣遣金帛來吾家始以船附魯珏輜重中船由平江齊門翌日到崑山依李閻崔賞泊於梅里尋移許浦未幾金兵犯平江望走青龍平江城不戰而破諸將如郭仲威輩先敵未至已刼掠城中幾無遺望常不快於韓世忠是時世忠兵盛權重駐鎮江聞望竄遣將董旻邀擄之旻至許浦以爲望在適吾家老小在彼旻來見待制遂邀以行始旻將至兵稍遲皆以爲金人悉棄船而走吾家船亦留江口命使臣温宏等守之老小係道弟舜舉侄仔徑走吳興惟予侍家君朝散同待制及令人等茫無所之漫地去而已夜宿野人家旻遣使臣來追堅欲吾家還船予謂若金人則不可從若世忠軍則中國兵且此投戈散地之時徃其中亦有所托何爲不可待制以爲然因舉家從以還時已行三二十里連夜從其使臣以還偶天晴及曉纔到船皆無恙一簪不失旻乃率待制入其軍於鎮江葢旻之意擄望不及且取參謀以塞其責而旻欲擄望未已也始船未行旻軍陣船到於江唯吾家一船在許浦港口未出江旻乃率吾家船入其軍趨水而下徃青龍必欲得望及至青龍江口聞望已還軍而西遂逆江而上之鎮江吾家船同行及至鎮江待制欲見世忠旻遮之不使見未幾造一船來換意欲取吾船中之米其所謂金帛者未至梅里望已追囘矣以諸將不欲令金帛離軍去殆有謀焉有言於望故也得所換之船吾家移過自留米餘皆與之本有百餘石所換之船通行船也亦能行江海有篷帆二物亦足用小泊於焦山雜於韓軍雜物船中旣至焦山船中隘不可居入寺中占其方丈老㓜悉安堵但日遊戲於焦山而已時金已破鎮江日見敵騎馳逐於江岸坐見其焚甘露寺但留雙塔世忠以江船鑿沈於閘口拒金人之出金船實不可出以閘口沈船縱横也世忠軍皆海船陣於江中中軍船長大處於中餘四軍皆分列以簇之甚可觀輜重船皆列於山後予日登焦山頂觀之山前但見作院等船耳二人爲兵器於寺前又有鎮江見任官及寺中之船皆於寺前太守李汝爲亦在焉汝爲亦韓軍中人世忠命爲太守者也三月十七晩東北風作至夜益甚江中飄水皆成冰予甞夜獨宿舟中守行李時吾家復有一小船同泊以行李載不盡故也是晩予上船遣人捉空籠相隨欲入船搬移衣物又攜錢千百入大船已昏黑風大船薄不可卧梢子姓朱通州人夜將半叩問朱梢船如何朱曰風太甚夜甚深但聞朱梢於神前有禱於䕶衛者復問朱云如何朱曰風大了不得也問吾小船安在曰不見久矣隨風以去也是日晝余觀大船之矴索其外似已舊爛其中一截斬新予嘗語朱此船藉此索爲命何不倒索而用之卷其舊者於裏出其新者於外庶可恃以牢乎朱曰此當然予曰明日潮來水滿可令近岸倒其索朱許之至是風作之甚又思其索舊且朽逾不遑安是時兵在南岸矴索若㫁必隨北風至彼當碎身與船於敵手矣船爲風震不得睡思之惶恐無限及曉幸吾船無恙但不能舉頭以惡心故也朱梢尋以面湯來亦不能用伸眉船外視則焦山之前唯吾一船而已餘皆不知所在遙視趙郡監者步履於山上如神仙中人㸃心時待制以予在船中遣小舟來因得登焦山之岸其去死亡一髪耳予尋登山頂望世忠軍極目江中無一船之存輜重在山後者亦畧不見其一又一二日山前之船稍集先是世忠旣塞閘口之河金人乃别開一河出江焦山初不知之至早飯時有金船二隻出在江但望見其船上黑且光耳必是其人衣鐡甲也此間船皆起矴以走是日世忠家私忌予入方丈諸僧方爲佛事未幾諸僧皆在船中蓋凢在山之人皆已登舟府官之屬亦然予家亦皆登舟隨倒起矴以下至垂山風適順乃令朱梢張帆順流而下韓軍望見吾家船去有呼住者予令勿應時船中有韓軍二卒亦令船住復勿聽二卒蓋世忠軍令守吾家者也稍行逺始語二卒待吾家至蘇湖以金帛遣汝囘否則無好到汝也二卒顧勢不可住乃俛首從之船過圌山風正順夜過江隂曉抵福山不知其幾里舟過福山時又正北風作抵常熟過平江望入平江城市並無一屋存者但見人家後林木而已菜園中間有屋亦止半間許河岸倒屍則無數出城河中更無水可飲以水皆浮尸至吳江止存屋三間其下横尸無數垂虹亭横橋皆已無止於亭下能取得少水堪飲自吳江南則浮尸益多有橋皆已㫁其處尸最多後問之云敵騎推人過皆死於水時燕子已來無屋可巢吾船用㠶乃銜泥作巢縁岸皆爲竈圏云金人縁岸故也所殺牛頻頻有之其骨與頭足並存但並無角金人取以去陳思恭所係敵船沈陷者尚有數隻於第四橋之南思恭周望軍統制官也待制嘗語望云樞密必欲守平江莫若移軍吳江據太湖天險吾軍以中軍振其前使諸將以小舟自太湖旁撃之可必勝望不主其議但令召諸將議之及諸軍畢集望命待制語方畧諸將不從蓋諸將皆魁賊喜亂志在爲賊而已思恭兵最少居下聞此謀躍而前曰待制之言甚善思恭願爲先鋒自餘不從竟已及敵過吳江思恭不稟望自以兵出太湖横擊其尾乃中原係累之民聞兵至皆爲内應縱火焚舟幾擄四太子者思恭雖勝望怒其不白然竟不遷官所沈敵舟凢半年許尚在河中吾家船至平望方欲首西以行東風又發一帆至吳興時望軍已至吳興矣凢曲折得風自垂山至吳興真天以相吾家也老㓜皆安然而歸始見弟妹已抵吳興旬日待制乃遣使臣以書爲信寄謝世忠董旻輩因送二卒徃仍取行李誥勅之寄軍中者旣取以歸聞世忠舟師敗於金人始敵在鎮江不可出故卽陸徃建康聚吾宋士大夫令籌所以破世忠皆云海船如遇風不可當船大而止且使風可四面卒難制如風使舟耳卒難搖動敵然之選舟載兵舟擄七八乘天曉風未動急搖近世忠以火箭射之船人救火不暇又無風船不可動遂大敗陷前軍十數舟自餘得遁蓋世忠初知金人徃建康亦泝江以舟師與對壘時議者固已非之曰兵法勿迎於水内半濟而撃之利今乃迎之於水内安有利也初予在焦山見世忠陳兵江中而鎮江江口山上有兀立不動下視吾軍者世忠船特大早晩諸將來稟議絡繹不絶皆用小舟明知大者爲世忠自餘匝軍船歴歴可數吾嘗自念吾軍中事金人莫不目見耳聞而金人賊中事吾軍畧不知之亦可慮矣終抵於敗何智術之疎耶於是金人安然渡江北歸世忠進官加恩尤自若也不數月待制守錢塘世忠入覲時車駕駐㑹稽所待世忠良厚乃大喜却恨前此失於一見且怨董旻爲之障旻來謁有慚色聞世忠將入錢塘界謂旻曰胡待制今却相見如何旻無語但愧汗而已世忠所攜杭妓吕小小卽以附志初小小有罪繫於獄其家欲脫之世忠偶赴待制飯因勸酒啓曰某有少事告訴待制若從所請當飲巨觥待制請言之卽以此妓爲懇待制爲破械世忠欣躍連飲數觥㑹散攜妓以歸妓後易姓茅玉照新志卷四
